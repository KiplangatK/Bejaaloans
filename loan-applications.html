<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Loan Applications | Bejja Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:#edf4ff;

font-family:Segoe UI,Tahoma,sans-serif;

}



/* SIDEBAR */

.sidebar{

position:fixed;

width:260px;

height:100vh;

background:#0d47a1;

color:white;

}



.logo{

padding:25px;

font-size:25px;

font-weight:bold;

border-bottom:1px solid rgba(255,255,255,.2);

}



.sidebar a{

display:block;

padding:15px 25px;

color:white;

text-decoration:none;

}



.sidebar a:hover{

background:#1565c0;

}




/* MAIN */


.main{

margin-left:260px;

}



.topbar{

height:70px;

background:#1976d2;

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

}




.content{

padding:30px;

}





.card-box{

background:white;

border-radius:15px;

padding:25px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}




.table thead th{

background:#e3f2fd;

color:#0d47a1;

}



.profile-img{

width:45px;

height:45px;

border-radius:50%;

object-fit:cover;

}



</style>


</head>



<body>



<!-- SIDEBAR -->


<div class="sidebar">


<div class="logo">

<i class="fa-solid fa-building-columns"></i>

Bejja Credit

</div>




<a href="admin-dashboard.html">

<i class="fa fa-dashboard"></i>

Dashboard

</a>



<a href="registered-clients.html">

<i class="fa fa-users"></i>

Registered Clients

</a>



<a href="active-loans.html">

<i class="fa fa-money-bill"></i>

Active Loans

</a>



<a href="loan-applications.html">

<i class="fa fa-file-circle-check"></i>

Loan Applications

</a>


</div>





<!-- MAIN -->


<div class="main">



<div class="topbar">


<h3>

Loan Applications

</h3>


<div>

Welcome

<strong id="adminName"></strong>

</div>


</div>




<div class="content">



<div class="card-box">



<h4 class="mb-4">

<i class="fa fa-list"></i>

Pending Loan Applications

</h4>




<table class="table table-hover">


<thead>

<tr>


<th>Photo</th>

<th>Client</th>

<th>Phone</th>

<th>Amount</th>

<th>Date</th>

<th>Status</th>

<th>Action</th>


</tr>

</thead>



<tbody id="applicationTable">


</tbody>



</table>



</div>


</div>


</div>
<!-- DATABASE -->

<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>



<script>


// CHECK ADMIN LOGIN


if(!AUTH.currentAdmin()){


window.location.href="admin-login.html";


}




// SHOW ADMIN NAME


let admin = AUTH.currentAdmin();


if(admin){


document.getElementById("adminName").innerHTML =

admin.username;


}





// MONEY FORMAT


function money(value){


return "KES " +

Number(value || 0)

.toLocaleString();


}









// LOAD APPLICATIONS


function loadApplications(){



let applications = DB.getApplications();



let table = document.getElementById(

"applicationTable"

);



table.innerHTML="";







let pending = applications.filter(app =>

app.status === "PENDING"

);






if(pending.length===0){



table.innerHTML=`

<tr>

<td colspan="7"

class="text-center text-muted p-4">


No pending applications.


</td>

</tr>

`;


return;


}








pending.reverse().forEach(app=>{





let client = DB.getClientById(

app.clientId

);





if(!client){

return;

}







table.innerHTML += `


<tr>


<td>


<img src="${client.profilePhoto ||

'https://via.placeholder.com/100'}"

class="profile-img">


</td>




<td>

${client.fullname || "-"}

</td>




<td>

${client.phone || "-"}

</td>





<td>

${money(app.amount)}

<br>

<small class="text-success">

Interest:

${money(app.amount*0.20)}

</small>


</td>





<td>

${app.applicationDate || "-"}

</td>






<td>


<span class="badge bg-warning">

${app.status}

</span>


</td>







<td>



<button

class="btn btn-primary btn-sm"

onclick="viewApplication(${app.id})">


<i class="fa fa-eye"></i>

View


</button>



</td>




</tr>



`;




});



}










// VIEW APPLICATION DETAILS



function viewApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}





let client = DB.getClientById(

app.clientId

);





let body=document.getElementById(

"detailsBody"

);







body.innerHTML=`



<div class="row">


<div class="col-md-4 text-center">


<img src="${client.profilePhoto ||

'https://via.placeholder.com/100'}"

class="rounded-circle mb-3"

style="width:120px;height:120px;object-fit:cover;">



<h5>

${client.fullname}

</h5>



</div>






<div class="col-md-8">


<h5 class="text-primary">

Client Details

</h5>



<p>

<b>National ID:</b>

${client.nationalID || "-"}

</p>




<p>

<b>Phone:</b>

${client.phone || "-"}

</p>




<p>

<b>Occupation:</b>

${client.occupation || "-"}

</p>




<p>

<b>Employer:</b>

${client.employer || "-"}

</p>




<hr>


<h5 class="text-primary">

Loan Details

</h5>



<p>

<b>Amount:</b>

${money(app.amount)}

</p>



<p>

<b>Monthly Interest:</b>

${money(app.amount*0.20)}

</p>




<p>

<b>Purpose:</b>

${app.purpose || "-"}

</p>




<p>

<b>Date Applied:</b>

${app.applicationDate}

</p>



</div>


</div>



<hr>



<h5 class="text-primary">

Guarantor Details

</h5>




<table class="table table-bordered">


<thead>

<tr>

<th>Name</th>

<th>ID</th>

<th>Phone</th>

<th>Relationship</th>

</tr>

</thead>



<tbody>



<tr>

<td>

${app.guarantor1?.name || "-"}

</td>


<td>

${app.guarantor1?.id || "-"}

</td>



<td>

${app.guarantor1?.phone || "-"}

</td>



<td>

${app.guarantor1?.relationship || "-"}

</td>


</tr>





<tr>


<td>

${app.guarantor2?.name || "-"}

</td>



<td>

${app.guarantor2?.id || "-"}

</td>




<td>

${app.guarantor2?.phone || "-"}

</td>




<td>

${app.guarantor2?.relationship || "-"}

</td>


</tr>



</tbody>


</table>





`;







let modal = new bootstrap.Modal(

document.getElementById(

"applicationModal"

)

);



modal.show();




}








loadApplications();

<!-- APPLICATION MODAL -->


<div class="modal fade" id="applicationModal">


<div class="modal-dialog modal-lg">


<div class="modal-content">


<div class="modal-header bg-primary text-white">


<h5 class="modal-title">

Loan Application Details

</h5>


<button class="btn-close"

data-bs-dismiss="modal">

</button>


</div>



<div class="modal-body"

id="detailsBody">


</div>



</div>


</div>


</div>
<!-- APPLICATION MODAL -->


<div class="modal fade" id="applicationModal">


<div class="modal-dialog modal-lg">


<div class="modal-content">


<div class="modal-header bg-primary text-white">


<h5 class="modal-title">

Loan Application Details

</h5>


<button class="btn-close"

data-bs-dismiss="modal">

</button>


</div>



<div class="modal-body"

id="detailsBody">


</div>



</div>


</div>


</div>
</script>
<!-- DATABASE -->
<script src="assets/js/database.js"></script>
<script src="assets/js/auth.js"></script>


<script>


// CHECK ADMIN LOGIN

if(!AUTH.currentAdmin()){

    window.location.href="admin-login.html";

}



// SHOW ADMIN NAME

let admin = AUTH.currentAdmin();

if(admin){

document.getElementById("adminName").innerHTML =
admin.username;

}





// FORMAT MONEY

function money(value){

return "KES " + Number(value || 0)
.toLocaleString();

}








// LOAD APPLICATIONS

function loadApplications(){



let applications = DB.getApplications();



let table = document.getElementById(
"applicationsTable"
);



table.innerHTML="";





if(applications.length===0){


table.innerHTML=`

<tr>

<td colspan="7"
class="text-center p-4 text-muted">

No loan applications found.

</td>

</tr>

`;

return;


}







applications.reverse().forEach(app=>{



let client = DB.getClientById(
app.clientId
);



table.innerHTML += `


<tr>



<td>

${client ? client.fullname : "-"}

</td>




<td>

${client ? client.phone : "-"}

</td>




<td>

${money(app.amount)}

</td>




<td>

${app.purpose || "-"}

</td>




<td>

${app.applicationDate || "-"}

</td>




<td>

<span class="badge 

${app.status==="APPROVED"

?"bg-success"

:

app.status==="REJECTED"

?"bg-danger"

:

"bg-warning"

}">


${app.status}


</span>


</td>




<td>


<button

class="btn btn-primary btn-sm"

onclick="viewApplication(${app.id})">


<i class="fa fa-eye"></i>

View Details


</button>



</td>



</tr>


`;



});



}











// VIEW APPLICATION DETAILS


function viewApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}




let client = DB.getClientById(
app.clientId
);





document.getElementById("clientName").innerHTML =
client.fullname;



document.getElementById("clientPhone").innerHTML =
client.phone;



document.getElementById("clientID").innerHTML =
client.nationalID;



document.getElementById("loanAmount").innerHTML =
money(app.amount);



document.getElementById("loanInterest").innerHTML =
money(app.monthlyInterest);



document.getElementById("loanPurpose").innerHTML =
app.purpose;



document.getElementById("applicationDate").innerHTML =
app.applicationDate;





// GUARANTOR 1

document.getElementById("g1").innerHTML = `

<strong>${app.guarantor1.name}</strong><br>

ID: ${app.guarantor1.id}<br>

Phone: ${app.guarantor1.phone}<br>

Relationship:
${app.guarantor1.relationship}

`;




// GUARANTOR 2

document.getElementById("g2").innerHTML = `

<strong>${app.guarantor2.name}</strong><br>

ID: ${app.guarantor2.id}<br>

Phone: ${app.guarantor2.phone}<br>

Relationship:
${app.guarantor2.relationship}

`;






let modal = new bootstrap.Modal(

document.getElementById("applicationModal")

);


modal.show();



}











// APPROVE APPLICATION


function approveApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}





app.status="APPROVED";



DB.updateApplication(app);






// CREATE ACTIVE LOAN


let loan={



clientId:app.clientId,


applicationId:app.id,


amount:app.amount,


originalPrincipal:app.amount,


remainingPrincipal:app.amount,


interestRate:20,


loanDate:DB.today(),


status:"ACTIVE"



};





DB.addLoan(loan);





alert(

"Loan Approved Successfully"

);




loadApplications();



}











// REJECT APPLICATION


function rejectApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}




app.status="REJECTED";



DB.updateApplication(app);



alert(

"Loan Application Rejected"

);



loadApplications();



}







loadApplications();



</script>
