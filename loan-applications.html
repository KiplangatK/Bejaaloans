<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Applications | Bejja Credit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
<style>
body{background:#edf4ff;font-family:'Segoe UI',Tahoma,sans-serif;}
.sidebar{position:fixed;left:0;top:0;width:260px;height:100vh;background:#0d47a1;color:white;}
.logo{padding:25px;font-size:25px;font-weight:bold;border-bottom:1px solid rgba(255,255,255,.2);}
.logo i{margin-right:10px;}
.sidebar a{display:block;padding:15px 25px;color:white;text-decoration:none;}
.sidebar a:hover{background:#1565c0;}
.sidebar i{width:25px;}
.main{margin-left:260px;}
.topbar{height:70px;background:#1976d2;color:white;display:flex;align-items:center;justify-content:space-between;padding:0 30px;box-shadow:0 3px 10px rgba(0,0,0,.15);}
.topbar h3{font-weight:700;}
.topbar .topbar-right{display:flex;align-items:center;gap:15px;}
.topbar .btn-back{background:rgba(255,255,255,0.2);color:white;padding:8px 16px;border-radius:20px;text-decoration:none;font-size:14px;font-weight:600;transition:.3s;}
.topbar .btn-back:hover{background:rgba(255,255,255,0.35);color:white;}
.content{padding:30px;}
.card-box{background:white;padding:25px;border-radius:20px;box-shadow:0 8px 25px rgba(0,0,0,.12);}
.table thead th{background:#e3f2fd;color:#0d47a1;}
.table td,.table th{padding:15px;vertical-align:middle;}
.profile-img{width:55px;height:55px;border-radius:50%;object-fit:cover;border:2px solid #1976d2;}
.btn-view{background:#1976d2;color:white;border-radius:20px;}
.btn-view:hover{background:#0d47a1;color:white;}
.section-title{background:#0d47a1;color:white;padding:10px 15px;border-radius:10px;margin-top:15px;}
.detail-card{background:#f8fbff;border-radius:15px;padding:15px;margin-bottom:15px;border:1px solid #dbeafe;}
.document-img{width:100%;height:160px;object-fit:contain;border-radius:10px;border:1px solid #ddd;}
.guarantor-photo{width:120px;height:120px;border-radius:50%;object-fit:cover;border:3px solid #2563eb;}
.form-control{height:50px;border-radius:12px;}
</style>
</head>
<body>

<div class="sidebar">
<div class="logo"><i class="fa-solid fa-building-columns"></i>Bejja Credit</div>
<a href="admin-dashboard.html"><i class="fa fa-dashboard"></i>Dashboard</a>
<a href="registered-clients.html"><i class="fa fa-users"></i>Registered Clients</a>
<a href="active-loans.html"><i class="fa fa-money-bill-wave"></i>Active Loans</a>
<a href="loan-applications.html"><i class="fa fa-file-circle-check"></i>Loan Applications</a>
<a href="#" onclick="logout()"><i class="fa fa-right-from-bracket"></i>Logout</a>
</div>

<div class="main">
<div class="topbar"><h3><i class="fa fa-file-circle-check"></i>Loan Applications</h3><div class="topbar-right"><a href="admin-dashboard.html" class="btn-back"><i class="fa fa-arrow-left"></i> Back</a><span>Welcome, <strong id="adminName">Admin</strong></span></div></div>
<div class="content">
<div class="card-box">
<h4 class="text-primary mb-4"><i class="fa fa-list"></i>Loan Application Requests</h4>
<div class="table-responsive"><table class="table table-hover align-middle"><thead><tr><th>Photo</th><th>Client</th><th>Phone</th><th>Amount</th><th>Purpose</th><th>Date Applied</th><th>Status</th><th>Action</th></tr></thead><tbody id="applicationsTable"><tr><td colspan="8" class="text-center text-muted p-4">Loading applications...</td></tr></tbody></table></div>
</div>
</div></div>

<div class="modal fade" id="applicationModal" tabindex="-1"><div class="modal-dialog modal-xl"><div class="modal-content"><div class="modal-header bg-primary text-white"><h5 class="modal-title"><i class="fa fa-file-circle-check"></i>Loan Application Details</h5><button class="btn-close" data-bs-dismiss="modal"></button></div><div class="modal-body" id="applicationDetails"></div><div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Close</button></div></div></div></div>

<script src="assets/js/database.js"></script>
<script src="assets/js/auth.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
if(!AUTH.currentAdmin()){window.location.href="admin-login.html";}
let admin=AUTH.currentAdmin();if(admin){document.getElementById("adminName").innerHTML=admin.username;}
function money(value){return "KES "+Number(value||0).toLocaleString();}
function formatDateDisplay(dateString){if(!dateString)return"";let parts=dateString.split("-");return parts[2]+"/"+parts[1]+"/"+parts[0];}
function getTodayInput(){return new Date().toISOString().split("T")[0];}
function getDefaultDueInput(){let d=new Date();d.setMonth(d.getMonth()+1);return d.toISOString().split("T")[0];}

async function loadApplications(){
    let applications=await DB.getApplications();let table=document.getElementById("applicationsTable");table.innerHTML="";
    if(!Array.isArray(applications)){table.innerHTML=`<tr><td colspan="8" class="text-center text-muted p-4">No pending applications found</td></tr>`;return;}
    let pending=applications.filter(app=>app.status==="PENDING");
    if(pending.length===0){table.innerHTML=`<tr><td colspan="8" class="text-center text-muted p-4">No pending applications found</td></tr>`;return;}
    const DEFAULT_IMG="https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    pending.reverse().forEach(app=>{let client=app.client||{};table.innerHTML+=`<tr><td><img src="${client.profilePhoto||DEFAULT_IMG}" class="profile-img"></td><td>${client.fullname||"-"}</td><td>${client.phone||"-"}</td><td>${money(app.amount)}<br><small class="text-success">Interest: ${money(app.amount*0.20)}</small></td><td>${app.purpose||"-"}</td><td>${app.applicationDate||"-"}</td><td><span class="badge bg-warning">${app.status}</span></td><td><button class="btn btn-view btn-sm" onclick="viewApplication(${app.id})"><i class="fa fa-eye"></i> View</button></td></tr>`;});
}

async function viewApplication(id){
    const DEFAULT_IMG="https://cdn-icons-png.flaticon.com/512/3135/3135715.png";let app=await DB.getApplication(id);if(!app)return;let client=app.client||{};
    document.getElementById("applicationDetails").innerHTML=`<div class="section-title"><i class="fa fa-user"></i> Client Information</div><div class="detail-card"><div class="row"><div class="col-md-4 text-center"><img src="${client.profilePhoto||DEFAULT_IMG}" class="guarantor-photo"><h5 class="mt-3">${client.fullname||"-"}</h5></div><div class="col-md-8"><p><b>National ID:</b> ${client.nationalID||"-"}</p><p><b>Phone:</b> ${client.phone||"-"}</p><p><b>Occupation:</b> ${client.occupation||"-"}</p><p><b>Employer:</b> ${client.employer||"-"}</p><p><b>Monthly Income:</b> ${money(client.monthlyIncome)}</p><p><b>County:</b> ${client.county||"-"}</p><p><b>Address:</b> ${client.address||"-"}</p></div></div></div><div class="section-title"><i class="fa fa-money-bill"></i> Loan Information</div><div class="detail-card"><div class="row"><div class="col-md-6"><p><b>Amount Requested:</b> ${money(app.amount)}</p><p><b>Monthly Interest (20%):</b> ${money(app.amount*0.20)}</p></div><div class="col-md-6"><p><b>Purpose:</b> ${app.purpose||"-"}</p><p><b>Status:</b> ${app.status}</p></div></div></div><div class="section-title"><i class="fa fa-users"></i> Guarantor Details</div>${showGuarantor(app.guarantor1,"Guarantor 1",DEFAULT_IMG)}${showGuarantor(app.guarantor2,"Guarantor 2",DEFAULT_IMG)}<div class="section-title mt-4"><i class="fa fa-calendar-check"></i> Approval Details</div><div class="detail-card"><div class="row"><div class="col-md-6 mb-3"><label class="fw-bold">Loan Date (Approval Date)</label><input type="date" id="approvalDate_${app.id}" class="form-control"></div><div class="col-md-6 mb-3"><label class="fw-bold">Due Date</label><input type="date" id="dueDate_${app.id}" class="form-control"></div></div></div><div class="text-center mt-4"><button class="btn btn-success me-2" onclick="approveApplication(${app.id})"><i class="fa fa-check"></i> Approve Loan</button><button class="btn btn-danger" onclick="rejectApplication(${app.id})"><i class="fa fa-times"></i> Reject</button></div>`;
    new bootstrap.Modal(document.getElementById("applicationModal")).show();
    setTimeout(()=>{let approvalInput=document.getElementById("approvalDate_"+app.id);let dueInput=document.getElementById("dueDate_"+app.id);if(approvalInput)approvalInput.value=getTodayInput();if(dueInput)dueInput.value=getDefaultDueInput();},300);
}

function showGuarantor(g,title,defaultImg){if(!g)return"";return`<div class="detail-card"><h5 class="text-primary">${title}</h5><div class="row"><div class="col-md-4 text-center"><img src="${g.photo||defaultImg}" class="guarantor-photo"></div><div class="col-md-8"><p><b>Name:</b> ${g.name||"-"}</p><p><b>National ID:</b> ${g.id||"-"}</p><p><b>Phone:</b> ${g.phone||"-"}</p><p><b>Relationship:</b> ${g.relationship||"-"}</p><p><b>Address:</b> ${g.address||"-"}</p></div></div><div class="row mt-3"><div class="col-md-6"><h6>ID Front</h6><img src="${g.idFront||""}" class="document-img"></div><div class="col-md-6"><h6>ID Back</h6><img src="${g.idBack||""}" class="document-img"></div></div></div>`;}

async function approveApplication(id){if(!confirm("Approve this loan application?"))return;let app=await DB.getApplication(id);if(!app)return;let admin=AUTH.currentAdmin();let approvalDateInput=document.getElementById("approvalDate_"+id);let dueDateInput=document.getElementById("dueDate_"+id);let today=new Date(),defaultDue=new Date();defaultDue.setMonth(defaultDue.getMonth()+1);let loanDate=approvalDateInput&&approvalDateInput.value?formatDateDisplay(approvalDateInput.value):today.toLocaleDateString("en-KE");let dueDate=dueDateInput&&dueDateInput.value?formatDateDisplay(dueDateInput.value):defaultDue.toLocaleDateString("en-KE");app.status="APPROVED";await DB.updateApplication(app);let loan={clientId:app.clientId,applicationId:app.id,originalPrincipal:app.amount,remainingPrincipal:app.amount,purpose:app.purpose,interestRate:20,currentInterest:app.amount*0.20,loanDate:loanDate,dueDate:dueDate,approvedBy:admin.username,status:"ACTIVE"};await DB.addLoan(loan);alert("Loan Approved Successfully");let modal=bootstrap.Modal.getInstance(document.getElementById("applicationModal"));if(modal)modal.hide();loadApplications();}

async function rejectApplication(id){if(!confirm("Reject this loan application?"))return;let app=await DB.getApplication(id);if(!app)return;app.status="REJECTED";await DB.updateApplication(app);alert("Loan Application Rejected");let modal=bootstrap.Modal.getInstance(document.getElementById("applicationModal"));if(modal)modal.hide();loadApplications();}

function logout(){AUTH.adminLogout();}

setTimeout(()=>{loadApplications();},600);
</script>
</body>
</html>
