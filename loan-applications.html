<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Loan Applications | Bejja Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:#edf4ff;

font-family:Segoe UI,Tahoma,sans-serif;

}



/* SIDEBAR */

.sidebar{

position:fixed;

width:260px;

height:100vh;

background:#0d47a1;

color:white;

}


.logo{

padding:25px;

font-size:25px;

font-weight:bold;

border-bottom:1px solid rgba(255,255,255,.2);

}



.sidebar a{

display:block;

padding:15px 25px;

color:white;

text-decoration:none;

}


.sidebar a:hover{

background:#1565c0;

}





/* MAIN */


.main{

margin-left:260px;

}




.topbar{

height:70px;

background:#1976d2;

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

}



.content{

padding:30px;

}



.card-box{

background:white;

border-radius:15px;

padding:25px;

box-shadow:0 5px 15px rgba(0,0,0,.1);

}



.profile-img{

width:50px;

height:50px;

border-radius:50%;

object-fit:cover;

}



</style>


</head>


<body>
    <!-- SIDEBAR -->

<div class="sidebar">


<div class="logo">

<i class="fa-solid fa-building-columns"></i>

Bejja Credit

</div>




<a href="admin-dashboard.html">

<i class="fa fa-dashboard"></i>

Dashboard

</a>




<a href="registered-clients.html">

<i class="fa fa-users"></i>

Registered Clients

</a>




<a href="active-loans.html">

<i class="fa fa-money-bill"></i>

Active Loans

</a>




<a href="loan-applications.html">

<i class="fa fa-file-circle-check"></i>

Loan Applications

</a>




<a href="admin-login.html">

<i class="fa fa-right-from-bracket"></i>

Logout

</a>



</div>







<!-- MAIN CONTENT -->


<div class="main">



<div class="topbar">


<h3>

<i class="fa fa-file-circle-check"></i>

Loan Applications

</h3>



<div>

Welcome

<strong id="adminName"></strong>

</div>



</div>








<div class="content">



<div class="card-box">





<h4 class="mb-4 text-primary">


<i class="fa fa-list"></i>


Loan Application Requests


</h4>







<table class="table table-hover align-middle">


<thead>


<tr>


<th>Photo</th>


<th>Client</th>


<th>Phone</th>


<th>Amount</th>


<th>Purpose</th>


<th>Date Applied</th>


<th>Status</th>


<th>Action</th>


</tr>


</thead>




<tbody id="applicationsTable">


</tbody>



</table>






</div>


</div>




</div>







<!-- APPLICATION DETAILS MODAL -->


<div class="modal fade" id="applicationModal">


<div class="modal-dialog modal-lg">


<div class="modal-content">



<div class="modal-header bg-primary text-white">


<h5 class="modal-title">

Loan Application Details

</h5>



<button class="btn-close"

data-bs-dismiss="modal">

</button>


</div>






<div class="modal-body"

id="applicationDetails">


</div>






</div>


</div>


</div>
<!-- DATABASE -->

<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>



<script>


// CHECK ADMIN LOGIN

if(!AUTH.currentAdmin()){

    window.location.href="admin-login.html";

}





// SHOW ADMIN NAME

let admin = AUTH.currentAdmin();


if(admin){

document.getElementById("adminName").innerHTML =

admin.username;

}







// FORMAT MONEY

function money(value){

return "KES " +

Number(value || 0)

.toLocaleString();

}









// LOAD APPLICATIONS


function loadApplications(){



let applications = DB.getApplications();



let table = document.getElementById(

"applicationsTable"

);



table.innerHTML="";





let pending = applications.filter(app =>

app.status === "PENDING"

);






if(pending.length===0){



table.innerHTML=`


<tr>

<td colspan="8"

class="text-center p-4 text-muted">


No pending loan applications.


</td>

</tr>


`;


return;


}







pending.reverse().forEach(app=>{



let client = DB.getClientById(

app.clientId

);




if(!client){

return;

}






table.innerHTML += `



<tr>



<td>

<img src="${client.profilePhoto || 

'https://via.placeholder.com/100'}"

class="profile-img">

</td>





<td>

${client.fullname || "-"}

</td>





<td>

${client.phone || "-"}

</td>






<td>

${money(app.amount)}

<br>

<small class="text-success">

Interest:

${money(app.amount*0.20)}

</small>

</td>






<td>

${app.purpose || "-"}

</td>






<td>

${app.applicationDate || "-"}

</td>






<td>


<span class="badge bg-warning">

${app.status}

</span>


</td>






<td>


<button

class="btn btn-primary btn-sm mb-1"

onclick="viewApplication(${app.id})">


<i class="fa fa-eye"></i>

View


</button>



</td>






</tr>



`;



});



}











// VIEW APPLICATION DETAILS


function viewApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}





let client = DB.getClientById(

app.clientId

);






document.getElementById(

"applicationDetails"

).innerHTML = `




<div class="row">


<div class="col-md-4 text-center">


<img src="${client.profilePhoto || 

'https://via.placeholder.com/120'}"

style="width:120px;height:120px;object-fit:cover;border-radius:50%;">



<h5 class="mt-3">

${client.fullname}

</h5>


</div>






<div class="col-md-8">



<h5 class="text-primary">

Client Details

</h5>



<p>

<b>National ID:</b>

${client.nationalID}

</p>




<p>

<b>Phone:</b>

${client.phone}

</p>




<p>

<b>Occupation:</b>

${client.occupation}

</p>




<p>

<b>Employer:</b>

${client.employer || "-"}

</p>





<hr>




<h5 class="text-primary">

Loan Details

</h5>



<p>

<b>Amount:</b>

${money(app.amount)}

</p>




<p>

<b>Monthly Interest (20%):</b>

${money(app.amount*0.20)}

</p>




<p>

<b>Purpose:</b>

${app.purpose}

</p>




<p>

<b>Date Applied:</b>

${app.applicationDate}

</p>



</div>


</div>




<hr>



<h5 class="text-primary">

Guarantors

</h5>



<table class="table table-bordered">


<tr>

<th>Name</th>

<th>ID</th>

<th>Phone</th>

<th>Relationship</th>

</tr>



<tr>

<td>

${app.guarantor1?.name || "-"}

</td>


<td>

${app.guarantor1?.id || "-"}

</td>


<td>

${app.guarantor1?.phone || "-"}

</td>


<td>

${app.guarantor1?.relationship || "-"}

</td>


</tr>






<tr>


<td>

${app.guarantor2?.name || "-"}

</td>


<td>

${app.guarantor2?.id || "-"}

</td>


<td>

${app.guarantor2?.phone || "-"}

</td>


<td>

${app.guarantor2?.relationship || "-"}

</td>


</tr>



</table>






<div class="text-center mt-4">


<button

class="btn btn-success me-2"

onclick="approveApplication(${app.id})">


<i class="fa fa-check"></i>

Approve Loan


</button>






<button

class="btn btn-danger"

onclick="rejectApplication(${app.id})">


<i class="fa fa-times"></i>

Reject


</button>



</div>



`;







let modal = new bootstrap.Modal(

document.getElementById(

"applicationModal"

)

);



modal.show();



}









// APPROVE LOAN


function approveApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}






// CHANGE APPLICATION STATUS


app.status="APPROVED";


DB.updateApplication(app);






// CREATE ACTIVE LOAN


let approvalDate = new Date();


// ADD ONE MONTH DUE DATE

let due = new Date();

due.setMonth(
    due.getMonth()+1
);



let loan={


clientId:app.clientId,


applicationId:app.id,


amount:app.amount,


originalPrincipal:app.amount,


remainingPrincipal:app.amount,



interestRate:20,



// DATE LOAN WAS GIVEN

loanDate:

approvalDate.toLocaleDateString("en-KE"),



// REPAYMENT DEADLINE

dueDate:

due.toLocaleDateString("en-KE"),



approvedBy:

admin.username,



status:"ACTIVE"



};






DB.addLoan(loan);






alert(

"Loan Approved Successfully"

);





loadApplications();





}











// REJECT LOAN


function rejectApplication(id){



let app = DB.getApplication(id);



if(!app){

return;

}





app.status="REJECTED";



DB.updateApplication(app);





alert(

"Loan Application Rejected"

);





loadApplications();



}









loadApplications();



</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>



</body>

</html>
