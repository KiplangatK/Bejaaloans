<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Loan Applications | Bejja Credit</title>


<!-- BOOTSTRAP -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<!-- FONT AWESOME -->

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:#edf4ff;

font-family:'Segoe UI',Tahoma,sans-serif;

}



/* =========================
SIDEBAR
========================= */


.sidebar{

position:fixed;

left:0;

top:0;

width:260px;

height:100vh;

background:#0d47a1;

color:white;

}



.logo{

padding:25px;

font-size:25px;

font-weight:bold;

border-bottom:1px solid rgba(255,255,255,.2);

}



.logo i{

margin-right:10px;

}




.sidebar a{

display:block;

padding:15px 25px;

color:white;

text-decoration:none;

}



.sidebar a:hover{

background:#1565c0;

}




.sidebar i{

width:25px;

}





/* =========================
MAIN
========================= */


.main{

margin-left:260px;

}





.topbar{

height:70px;

background:#1976d2;

color:white;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

box-shadow:0 3px 10px rgba(0,0,0,.15);

}



.topbar h3{

font-weight:700;

}





.content{

padding:30px;

}





.card-box{

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.12);

}





.table thead th{

background:#e3f2fd;

color:#0d47a1;

}



.table td,
.table th{

padding:15px;

vertical-align:middle;

}




.profile-img{

width:55px;

height:55px;

border-radius:50%;

object-fit:cover;

border:2px solid #1976d2;

}





.btn-view{

background:#1976d2;

color:white;

border-radius:20px;

}



.btn-view:hover{

background:#0d47a1;

color:white;

}





.section-title{

background:#0d47a1;

color:white;

padding:10px 15px;

border-radius:10px;

margin-top:15px;

}




.detail-card{

background:#f8fbff;

border-radius:15px;

padding:15px;

margin-bottom:15px;

border:1px solid #dbeafe;

}





.document-img{

width:100%;

height:160px;

object-fit:contain;

border-radius:10px;

border:1px solid #ddd;

}





.guarantor-photo{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #2563eb;

}





</style>


</head>


<body>



<!-- =========================
SIDEBAR
========================= -->


<div class="sidebar">



<div class="logo">


<i class="fa-solid fa-building-columns"></i>


Bejja Credit


</div>





<a href="admin-dashboard.html">

<i class="fa fa-dashboard"></i>

Dashboard

</a>





<a href="registered-clients.html">

<i class="fa fa-users"></i>

Registered Clients

</a>





<a href="active-loans.html">

<i class="fa fa-money-bill-wave"></i>

Active Loans

</a>





<a href="loan-applications.html">

<i class="fa fa-file-circle-check"></i>

Loan Applications

</a>






<a href="admin-login.html">

<i class="fa fa-right-from-bracket"></i>

Logout

</a>



</div>






<!-- =========================
MAIN CONTENT
========================= -->


<div class="main">



<div class="topbar">


<h3>

<i class="fa fa-file-circle-check"></i>

Loan Applications

</h3>




<div>

Welcome

<strong id="adminName">

Admin

</strong>

</div>



</div>







<div class="content">



<div class="card-box">



<h4 class="text-primary mb-4">


<i class="fa fa-list"></i>


Loan Application Requests


</h4>





<div class="table-responsive">


<table class="table table-hover align-middle">



<thead>


<tr>


<th>

Photo

</th>


<th>

Client

</th>


<th>

Phone

</th>


<th>

Amount

</th>


<th>

Purpose

</th>


<th>

Date Applied

</th>


<th>

Status

</th>


<th>

Action

</th>



</tr>


</thead>




<tbody id="applicationsTable">


</tbody>



</table>



</div>



</div>



</div>


</div>
<!-- =========================
APPLICATION DETAILS MODAL
========================= -->


<div class="modal fade" id="applicationModal" tabindex="-1">


<div class="modal-dialog modal-xl">


<div class="modal-content">



<div class="modal-header bg-primary text-white">


<h5 class="modal-title">

<i class="fa fa-file-circle-check"></i>

Loan Application Details

</h5>



<button class="btn-close"

data-bs-dismiss="modal">

</button>


</div>





<div class="modal-body"

id="applicationDetails">



</div>





<div class="modal-footer">


<button class="btn btn-secondary"

data-bs-dismiss="modal">

Close

</button>


</div>




</div>


</div>


</div>







<!-- DATABASE -->

<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>




<!-- BOOTSTRAP JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>





<script>





// ===============================
// ADMIN LOGIN CHECK
// ===============================


if(!AUTH.currentAdmin()){


window.location.href="admin-login.html";


}





let admin = AUTH.currentAdmin();



if(admin){


document.getElementById("adminName").innerHTML =

admin.username;


}






// ===============================
// MONEY FORMAT
// ===============================


function money(value){


return "KES " +

Number(value || 0)

.toLocaleString();


}







// ===============================
// LOAD APPLICATIONS
// ===============================


function loadApplications(){



let applications = DB.getApplications();



let table = document.getElementById(

"applicationsTable"

);



table.innerHTML="";





let pending = applications.filter(app =>


app.status === "PENDING"


);







if(pending.length===0){


table.innerHTML=`

<tr>


<td colspan="8"

class="text-center text-muted p-4">


No pending applications found


</td>


</tr>

`;


return;


}








pending.reverse().forEach(app=>{





let client = DB.getClientById(

app.clientId

);





if(!client){


return;


}






table.innerHTML += `



<tr>



<td>


<img src="${client.profilePhoto || 

'https://via.placeholder.com/100'}"

class="profile-img">


</td>





<td>


${client.fullname || "-"}


</td>





<td>


${client.phone || "-"}


</td>






<td>


${money(app.amount)}


<br>


<small class="text-success">


Interest:

${money(app.amount * 0.20)}


</small>



</td>







<td>


${app.purpose || "-"}


</td>






<td>


${app.applicationDate || "-"}


</td>







<td>


<span class="badge bg-warning">


${app.status}


</span>


</td>








<td>



<button

class="btn btn-view btn-sm"


onclick="viewApplication(${app.id})">


<i class="fa fa-eye"></i>


View


</button>



</td>






</tr>


`;



});



}









// ===============================
// VIEW APPLICATION DETAILS
// ===============================



function viewApplication(id){



let app = DB.getApplication(id);




if(!app){


return;


}






let client = DB.getClientById(

app.clientId

);





if(!client){


return;


}








document.getElementById(

"applicationDetails"

).innerHTML = `





<!-- CLIENT INFORMATION -->


<div class="section-title">


<i class="fa fa-user"></i>


Client Information


</div>






<div class="detail-card">


<div class="row">





<div class="col-md-4 text-center">



<img src="${client.profilePhoto || 

'https://via.placeholder.com/120'}"

class="guarantor-photo">


<h5 class="mt-3">


${client.fullname || "-"}


</h5>


</div>







<div class="col-md-8">


<p><b>National ID:</b>

${client.nationalID || "-"}

</p>



<p><b>Phone:</b>

${client.phone || "-"}

</p>



<p><b>Occupation:</b>

${client.occupation || "-"}

</p>



<p><b>Employer:</b>

${client.employer || "-"}

</p>



<p><b>Monthly Income:</b>

${money(client.monthlyIncome)}

</p>



<p><b>County:</b>

${client.county || "-"}

</p>



<p><b>Address:</b>

${client.address || "-"}

</p>



</div>



</div>


</div>







<!-- LOAN INFORMATION -->


<div class="section-title">


<i class="fa fa-money-bill"></i>


Loan Information


</div>





<div class="detail-card">



<div class="row">



<div class="col-md-6">


<p>


<b>Amount Requested:</b>


${money(app.amount)}


</p>



<p>


<b>Monthly Interest (20%):</b>


${money(app.amount * 0.20)}


</p>



</div>







<div class="col-md-6">


<p>


<b>Purpose:</b>


${app.purpose || "-"}


</p>





<p>


<b>Status:</b>


${app.status}


</p>



</div>



</div>



</div>








<!-- GUARANTORS -->


<div class="section-title">


<i class="fa fa-users"></i>


Guarantor Details


</div>




${showGuarantor(app.guarantor1,"Guarantor 1")}


${showGuarantor(app.guarantor2,"Guarantor 2")}







<div class="text-center mt-4">



<button class="btn btn-success me-2"

onclick="approveApplication(${app.id})">


<i class="fa fa-check"></i>


Approve Loan


</button>






<button class="btn btn-danger"

onclick="rejectApplication(${app.id})">


<i class="fa fa-times"></i>


Reject


</button>




</div>






`;







let modal = new bootstrap.Modal(

document.getElementById(

"applicationModal"

)

);



modal.show();




}








// ===============================
// DISPLAY GUARANTOR
// ===============================



function showGuarantor(g,title){



if(!g){


return "";


}





return `



<div class="detail-card">



<h5 class="text-primary">


${title}


</h5>




<div class="row">





<div class="col-md-4 text-center">



<img src="${g.photo || 

'https://via.placeholder.com/120'}"

class="guarantor-photo">



</div>





<div class="col-md-8">



<p>

<b>Name:</b>

${g.name || "-"}

</p>




<p>

<b>National ID:</b>

${g.id || "-"}

</p>




<p>

<b>Phone:</b>

${g.phone || "-"}

</p>




<p>

<b>Relationship:</b>

${g.relationship || "-"}

</p>




<p>

<b>Address:</b>

${g.address || "-"}

</p>




</div>



</div>






<div class="row mt-3">



<div class="col-md-6">


<h6>ID Front</h6>


<img src="${g.idFront || ''}"

class="document-img">


</div>







<div class="col-md-6">


<h6>ID Back</h6>


<img src="${g.idBack || ''}"

class="document-img">


</div>



</div>



</div>



`;



}



// ===============================
// APPROVE APPLICATION
// ===============================


function approveApplication(id){



let app = DB.getApplication(id);



if(!app){


return;


}






let admin = AUTH.currentAdmin();







// CHANGE APPLICATION STATUS


app.status="APPROVED";


DB.updateApplication(app);







// CREATE DUE DATE


let approvalDate = new Date();



let due = new Date();



due.setMonth(

due.getMonth()+1

);







// CREATE ACTIVE LOAN RECORD


let loan={





// CONNECTION IDS


clientId:app.clientId,


applicationId:app.id,







// SAVE CLIENT SNAPSHOT


client:app.client,







// LOAN INFORMATION


amount:app.amount,


originalPrincipal:app.amount,


remainingPrincipal:app.amount,



purpose:app.purpose,



interestRate:20,



currentInterest:

app.amount * 0.20,







// GUARANTORS


guarantor1:app.guarantor1,



guarantor2:app.guarantor2,








// PAYMENT HISTORY


payments:[],








// DATES


loanDate:

approvalDate.toLocaleDateString("en-KE"),




dueDate:

due.toLocaleDateString("en-KE"),







// APPROVAL DETAILS


approvedBy:

admin.username,





status:"ACTIVE"




};









// SAVE ACTIVE LOAN


DB.addLoan(loan);







alert(

"Loan Approved Successfully"

);







// CLOSE MODAL


let modalElement = document.getElementById(

"applicationModal"

);



let modal = bootstrap.Modal.getInstance(

modalElement

);



if(modal){


modal.hide();


}








loadApplications();





}












// ===============================
// REJECT APPLICATION
// ===============================



function rejectApplication(id){



let app = DB.getApplication(id);



if(!app){


return;


}





app.status="REJECTED";



DB.updateApplication(app);






alert(

"Loan Application Rejected"

);






let modalElement = document.getElementById(

"applicationModal"

);



let modal = bootstrap.Modal.getInstance(

modalElement

);



if(modal){


modal.hide();


}






loadApplications();



}









// ===============================
// START PAGE
// ===============================


loadApplications();





</script>





</body>


</html>
