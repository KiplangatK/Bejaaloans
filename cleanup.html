<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Database | Bejja Credit</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#edf4ff; font-family:'Segoe UI',sans-serif;">

<div class="container py-5">
    <div class="card shadow-lg mx-auto" style="max-width:600px; border-radius:20px;">
        <div class="card-body p-5 text-center">
            
            <i class="fa-solid fa-triangle-exclamation fa-3x text-danger mb-3"></i>
            <h3>Reset Database</h3>
            <p class="text-muted">This will delete ALL clients, loans, applications, and payments.</p>
            <p class="text-danger fw-bold">This cannot be undone!</p>
            
            <div id="status" class="alert alert-info mt-3">
                Ready to reset. Click the button below.
            </div>
            
            <button id="resetBtn" class="btn btn-danger btn-lg w-100" onclick="resetDatabase()">
                <i class="fa fa-trash"></i> Delete All Data
            </button>
            
            <div id="result" class="mt-3"></div>
            
            <a href="admin-dashboard.html" class="btn btn-primary w-100 mt-3">
                <i class="fa fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<script src="assets/js/database.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
async function resetDatabase() {
    if (!confirm("WARNING: This will permanently delete ALL data!\n\nClients, loans, applications, and payments will be gone forever.\n\nThe default admin account will be recreated.\n\nAre you sure?")) return;
    
    if (!confirm("FINAL WARNING: This cannot be undone.\n\nClick OK to proceed.")) return;
    
    document.getElementById("resetBtn").disabled = true;
    document.getElementById("resetBtn").innerHTML = '<i class="fa fa-spinner fa-spin"></i> Deleting...';
    document.getElementById("status").className = "alert alert-warning";
    document.getElementById("status").innerHTML = "Deleting all data...";
    
    try {
        // Delete and recreate the database
        indexedDB.deleteDatabase("BejjaDB");
        
        await new Promise(r => setTimeout(r, 1000));
        
        // Reload the page to reinitialize
        document.getElementById("status").className = "alert alert-success";
        document.getElementById("status").innerHTML = "✅ All data deleted! Default admin recreated.<br>Username: admin<br>Password: admin123";
        document.getElementById("resetBtn").style.display = "none";
        
        document.getElementById("result").innerHTML = `
            <div class="alert alert-success mt-3">
                <h5>✅ Reset Complete!</h5>
                <p>All client data has been cleared.</p>
                <p><b>Admin login:</b> admin / admin123</p>
                <a href="index.html" class="btn btn-success mt-2">Go to Homepage</a>
            </div>
        `;
        
    } catch(e) {
        document.getElementById("status").className = "alert alert-danger";
        document.getElementById("status").innerHTML = "Error: " + e.message;
        document.getElementById("resetBtn").disabled = false;
    }
}
</script>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</body>
</html>
