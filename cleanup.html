<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DB Test</title>
</head>
<body>
<h2>Database Test</h2>
<button onclick="testDB()">Test Database</button>
<button onclick="addTestClient()">Add Test Client</button>
<div id="result"></div>

<script src="assets/js/database.js"></script>
<script>
async function testDB() {
    const r = document.getElementById("result");
    r.innerHTML = "Testing...";
    
    try {
        const clients = await DB.getClients();
        const staff = await DB.getStaff();
        r.innerHTML = `
            <p>✅ Database is working!</p>
            <p>Clients: ${clients.length}</p>
            <p>Staff: ${staff.length}</p>
            <p>Staff list: ${JSON.stringify(staff)}</p>
        `;
    } catch(e) {
        r.innerHTML = `<p>❌ Error: ${e.message}</p>`;
    }
}

async function addTestClient() {
    const r = document.getElementById("result");
    try {
        const client = await DB.addClient({
            fullname: "Test User",
            nationalID: "12345678",
            phone: "0712345678",
            password: "test123",
            occupation: "Tester",
            monthlyIncome: "50000",
            county: "Nairobi",
            address: "Test Address"
        });
        r.innerHTML = `<p>✅ Client added! ID: ${client.id}</p>`;
    } catch(e) {
        r.innerHTML = `<p>❌ Error adding client: ${e.message}</p>`;
    }
}
</script>
</body>
</html>
