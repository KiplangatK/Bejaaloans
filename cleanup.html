<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Complete Reset</title>
</head>
<body>
<h2>Complete Database Reset</h2>
<p id="status">Deleting old database...</p>

<script>
// Step 1: Delete old database
indexedDB.deleteDatabase("BejjaDB");
document.getElementById("status").innerHTML = "Old database deleted. Creating fresh one...";

// Step 2: Wait then create fresh
setTimeout(() => {
    const request = indexedDB.open("BejjaDB", 1);
    
    request.onupgradeneeded = function(e) {
        const db = e.target.result;
        if (!db.objectStoreNames.contains("staff")) {
            const store = db.createObjectStore("staff", { keyPath: "id", autoIncrement: true });
            store.createIndex("username", "username", { unique: true });
        }
        if (!db.objectStoreNames.contains("clients")) {
            const store = db.createObjectStore("clients", { keyPath: "id", autoIncrement: true });
            store.createIndex("phone", "phone", { unique: true });
            store.createIndex("status", "status", { unique: false });
        }
        if (!db.objectStoreNames.contains("loanApplications")) {
            const store = db.createObjectStore("loanApplications", { keyPath: "id", autoIncrement: true });
            store.createIndex("clientId", "clientId", { unique: false });
            store.createIndex("status", "status", { unique: false });
        }
        if (!db.objectStoreNames.contains("loans")) {
            const store = db.createObjectStore("loans", { keyPath: "id", autoIncrement: true });
            store.createIndex("clientId", "clientId", { unique: false });
            store.createIndex("status", "status", { unique: false });
        }
        if (!db.objectStoreNames.contains("payments")) {
            const store = db.createObjectStore("payments", { keyPath: "id", autoIncrement: true });
            store.createIndex("loanId", "loanId", { unique: false });
        }
    };
    
    request.onsuccess = function(e) {
        const db = e.target.result;
        // Add default admin
        const tx = db.transaction("staff", "readwrite");
        const store = tx.objectStore("staff");
        store.add({
            username: "admin",
            password: "admin123",
            role: "Administrator",
            active: true
        });
        
        tx.oncomplete = function() {
            document.getElementById("status").innerHTML = `
                <p style="color:green"><b>✅ Database reset complete!</b></p>
                <p>Admin account created:</p>
                <p><b>Username:</b> admin<br><b>Password:</b> admin123</p>
                <p>Now open <a href="admin-portal.html">Admin Login</a> and login.</p>
            `;
        };
    };
    
    request.onerror = function() {
        document.getElementById("status").innerHTML = "Error creating database. Try refreshing.";
    };
}, 1000);
</script>
</body>
</html>
