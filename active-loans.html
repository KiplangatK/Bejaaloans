<script>


/* ADMIN SECURITY */

if(!AUTH.currentAdmin()){
    window.location.href="admin-login.html";
}

let admin = AUTH.currentAdmin();

if(admin){
    document.getElementById("adminName").innerHTML = admin.username;
}


function money(value){
    return "KES " + Number(value || 0).toLocaleString();
}


/* LOAD ACTIVE LOANS */

async function loadActiveLoans(){

    let dbReady = false;
    let retries = 0;
    while (!dbReady && retries < 50) {
        try {
            if (window.DB && typeof DB.getLoans === "function") {
                const test = await DB.getLoans();
                if (Array.isArray(test)) { dbReady = true; break; }
            }
        } catch(e) {}
        await new Promise(r => setTimeout(r, 100));
        retries++;
    }
    if (!dbReady) return;

    let loans = await DB.getLoans();
    let table = document.getElementById("activeLoansTable");
    table.innerHTML = "";

    if (!Array.isArray(loans)) {
        table.innerHTML = `<tr><td colspan="9" class="text-center text-muted p-4">No active loans found</td></tr>`;
        return;
    }

    let active = loans.filter(l => l.status === "ACTIVE");

    if (active.length === 0) {
        table.innerHTML = `<tr><td colspan="9" class="text-center text-muted p-4">No active loans found</td></tr>`;
        return;
    }

    const DEFAULT_IMG = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    for (let loan of active.reverse()) {
        let client = await DB.getClientById(loan.clientId);
        if (!client) continue;

        let balance = Number(loan.remainingPrincipal || 0);
        let rate = Number(loan.interestRate || 20);
        let interestAmount = (balance * rate) / 100;

        table.innerHTML += `
            <tr>
                <td><img src="${client.profilePhoto || DEFAULT_IMG}" class="profile-img"></td>
                <td>${client.fullname || "-"}</td>
                <td>${client.phone || "-"}</td>
                <td>${money(loan.originalPrincipal)}</td>
                <td class="fw-bold text-danger">${money(balance)}</td>
                <td>${money(interestAmount)} (${rate}%)</td>
                <td>${loan.loanDate || "-"}</td>
                <td><span class="badge bg-danger">${loan.dueDate || "-"}</span></td>
                <td>
                    <button class="btn btn-view btn-sm mb-1" onclick="viewLoan(${loan.id})">
                        <i class="fa fa-eye"></i> Details
                    </button>
                    <button class="btn btn-payment btn-sm" onclick="openPayment(${loan.id}, '${loan.dueDate || ''}')">
                        <i class="fa fa-money-bill"></i> Payment
                    </button>
                </td>
            </tr>`;
    }

}


// ===============================
// VIEW LOAN DETAILS
// ===============================

async function viewLoan(id){

    let loan = await DB.getLoan(id);
    if(!loan) return;

    let client = await DB.getClientById(loan.clientId);
    let balance = Number(loan.remainingPrincipal || 0);
    let rate = Number(loan.interestRate || 20);
    let currentInterest = (balance * rate) / 100;

    // Get all payments
    let payments = await DB.getLoanPayments(loan.id);
    
    // Calculate early vs regular payments
    let totalEarlyPaid = 0;
    let totalRegularPaid = 0;
    let totalPaid = 0;
    
    if (Array.isArray(payments) && loan.dueDate) {
        const parts = loan.dueDate.split("/");
        if (parts.length === 3) {
            const dueDate = new Date(parts[2], parts[1] - 1, parts[0]);
            
            payments.forEach(p => {
                const amount = Number(p.amount || 0);
                totalPaid += amount;
                
                if (p.date) {
                    const pParts = p.date.split("/");
                    if (pParts.length === 3) {
                        const paymentDate = new Date(pParts[2], pParts[1] - 1, pParts[0]);
                        if (paymentDate < dueDate) {
                            totalEarlyPaid += amount;
                        } else {
                            totalRegularPaid += amount;
                        }
                    }
                }
            });
        }
    }
    
    let totalExpected = Number(loan.originalPrincipal) + (Number(loan.originalPrincipal) * rate / 100);
    let repaymentProgress = totalExpected > 0 ? Math.round((totalPaid / totalExpected) * 100) : 0;

    document.getElementById("loanDetails").innerHTML = `

        <h5 class="text-primary">Client Information</h5>
        <hr>
        <p><b>Name:</b> ${client.fullname}</p>
        <p><b>Phone:</b> ${client.phone}</p>

        <h5 class="text-primary mt-4">Loan Information</h5>
        <hr>
        <div class="row">
            <div class="col-md-6">
                <p><b>Original Loan Amount:</b> ${money(loan.originalPrincipal)}</p>
                <p><b>Remaining Principal:</b> ${money(balance)}</p>
                <p><b>Current Interest Owed:</b> ${money(currentInterest)}</p>
                <p><b>Interest Rate:</b> ${rate}%</p>
            </div>
            <div class="col-md-6">
                <p><b>Total Paid:</b> <span class="text-success fw-bold">${money(totalPaid)}</span></p>
                <p><b>Early Payments:</b> <span class="text-primary fw-bold">${money(totalEarlyPaid)}</span></p>
                <p><b>Regular/Late Payments:</b> <span class="text-warning fw-bold">${money(totalRegularPaid)}</span></p>
                <p><b>Repayment Progress:</b> ${repaymentProgress}%</p>
            </div>
        </div>
        <p><b>Loan Date:</b> ${loan.loanDate || "-"}</p>
        <p><b>Due Date:</b> <span class="badge bg-danger">${loan.dueDate || "-"}</span></p>
        <p><b>Status:</b> <span class="badge bg-success">${loan.status}</span></p>

        <div class="progress mt-2 mb-3" style="height:10px;">
            <div class="progress-bar bg-success" style="width:${repaymentProgress}%"></div>
        </div>

        <div class="text-center mt-3 mb-3">
            <button class="btn btn-guarantors" onclick="toggleGuarantors(${loan.applicationId || 0})">
                <i class="fa fa-users"></i> View Guarantors
            </button>
        </div>
        <div id="guarantorSection" style="display:none;"></div>

        <h5 class="text-primary mt-4">Payment History</h5>
        <table class="table table-bordered">
            <tr><th>Date</th><th>Amount</th><th>Principal Paid</th><th>Interest Paid</th><th>Balance</th><th>Type</th><th>Note</th></tr>
            ${await loadPaymentRows(loan)}
        </table>

    `;

    let modal = new bootstrap.Modal(document.getElementById("loanModal"));
    modal.show();

}


// ===============================
// TOGGLE GUARANTORS
// ===============================

async function toggleGuarantors(applicationId) {
    const section = document.getElementById("guarantorSection");
    
    if (section.style.display === "block") {
        section.style.display = "none";
        return;
    }
    
    if (!applicationId || applicationId === 0) {
        section.innerHTML = `<p class="text-muted">No guarantor details available.</p>`;
        section.style.display = "block";
        return;
    }
    
    section.innerHTML = `<p class="text-center text-muted">Loading guarantor details...</p>`;
    section.style.display = "block";
    
    let application = await DB.getApplication(applicationId);
    
    if (!application) {
        section.innerHTML = `<p class="text-muted">No guarantor details available.</p>`;
        return;
    }
    
    const DEFAULT_IMG = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    
    section.innerHTML = `
        <hr>
        <h5 class="text-primary"><i class="fa fa-users"></i> Guarantor Details</h5>
        ${showGuarantor(application.guarantor1, "Guarantor 1", DEFAULT_IMG)}
        ${showGuarantor(application.guarantor2, "Guarantor 2", DEFAULT_IMG)}
    `;
}


function showGuarantor(g, title, DEFAULT_IMG){
    if(!g) return "";
    if(!DEFAULT_IMG) DEFAULT_IMG = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    return `
    <div class="detail-card">
        <h5 class="text-primary">${title}</h5>
        <div class="row">
            <div class="col-md-4 text-center">
                <img src="${g.photo || DEFAULT_IMG}" class="guarantor-photo">
            </div>
            <div class="col-md-8">
                <p><b>Name:</b> ${g.name || "-"}</p>
                <p><b>National ID:</b> ${g.id || "-"}</p>
                <p><b>Phone:</b> ${g.phone || "-"}</p>
                <p><b>Relationship:</b> ${g.relationship || "-"}</p>
                <p><b>Address:</b> ${g.address || "-"}</p>
            </div>
        </div>
        <div class="row mt-3">
            <div class="col-md-6"><h6>ID Front</h6><img src="${g.idFront || ''}" class="document-img"></div>
            <div class="col-md-6"><h6>ID Back</h6><img src="${g.idBack || ''}" class="document-img"></div>
        </div>
    </div>`;
}


// ===============================
// PAYMENT HISTORY
// ===============================

async function loadPaymentRows(loan){
    let payments = await DB.getLoanPayments(loan.id);
    if(payments.length === 0){
        return `<tr><td colspan="7" class="text-center">No payments yet</td></tr>`;
    }
    
    let rows = "";
    
    let dueDate = null;
    if (loan.dueDate) {
        const parts = loan.dueDate.split("/");
        if (parts.length === 3) {
            dueDate = new Date(parts[2], parts[1] - 1, parts[0]);
        }
    }
    
    payments.forEach(p => {
        let typeBadge = "";
        if (p.date && dueDate) {
            const pParts = p.date.split("/");
            if (pParts.length === 3) {
                const paymentDate = new Date(pParts[2], pParts[1] - 1, pParts[0]);
                if (paymentDate < dueDate) {
                    typeBadge = `<span class="badge bg-primary">Early</span>`;
                } else {
                    typeBadge = `<span class="badge bg-warning text-dark">Regular</span>`;
                }
            }
        }
        
        rows += `
            <tr>
                <td>${p.date}</td>
                <td>${money(p.amount)}</td>
                <td>${money(p.principalPaid)}</td>
                <td>${money(p.interestPaid)}</td>
                <td>${money(p.balance)}</td>
                <td>${typeBadge}</td>
                <td>${p.note || "-"}</td>
            </tr>`;
    });
    return rows;
}


// ===============================
// OPEN PAYMENT
// ===============================

function openPayment(id, dueDate){
    document.getElementById("paymentLoanId").value = id;
    document.getElementById("paymentLoanDueDate").value = dueDate;
    document.getElementById("paymentAmount").value = "";
    document.getElementById("paymentDate").value = new Date().toISOString().split("T")[0];
    document.getElementById("paymentComment").value = "";
    document.getElementById("earlyPaymentNote").style.display = "none";
    
    updatePaymentNote();

    let modal = new bootstrap.Modal(document.getElementById("paymentModal"));
    modal.show();
}


// ===============================
// UPDATE PAYMENT NOTE
// ===============================

function updatePaymentNote() {
    const dueDateStr = document.getElementById("paymentLoanDueDate").value;
    const paymentDateStr = document.getElementById("paymentDate").value;
    const amount = Number(document.getElementById("paymentAmount").value) || 0;
    const noteEl = document.getElementById("earlyPaymentNote");
    const commentEl = document.getElementById("paymentComment");

    if (!dueDateStr || !paymentDateStr) {
        noteEl.style.display = "none";
        commentEl.value = "";
        return;
    }

    const parts = dueDateStr.split("/");
    if (parts.length !== 3) return;
    const dueDate = new Date(parts[2], parts[1] - 1, parts[0]);
    const paymentDate = new Date(paymentDateStr + "T00:00:00");

    if (paymentDate < dueDate && amount > 0) {
        const days = Math.floor((dueDate - paymentDate) / (1000 * 60 * 60 * 24));
        noteEl.style.display = "block";
        noteEl.innerHTML = `<i class="fa fa-info-circle"></i> <b>Early Payment</b> — This payment is <b>${days} days</b> before the due date (${dueDateStr}). The full amount will be deducted from the outstanding balance.`;
        commentEl.value = `Early payment (${days} days before due date)`;
    } else if (paymentDate >= dueDate && amount > 0) {
        noteEl.style.display = "block";
        noteEl.innerHTML = `<i class="fa fa-exclamation-triangle"></i> <b>Late/On-Time Payment</b> — Payment is on or after the due date. Interest will be covered first, then principal.`;
        commentEl.value = "Payment on/after due date";
    } else {
        noteEl.style.display = "none";
        commentEl.value = "";
    }
}


// ===============================
// SAVE PAYMENT
// ===============================

async function savePayment(){

    let loanId = Number(document.getElementById("paymentLoanId").value);
    let amount = Number(document.getElementById("paymentAmount").value);
    let dateInput = document.getElementById("paymentDate").value;
    let method = document.getElementById("paymentMethod").value;
    let note = document.getElementById("paymentComment").value;

    if(amount <= 0){
        alert("Enter payment amount");
        return;
    }

    // Convert date from YYYY-MM-DD (input) to DD/MM/YYYY (storage)
    let formattedDate = dateInput;
    if (dateInput && dateInput.includes("-")) {
        const parts = dateInput.split("-");
        formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
    }

    await DB.addPayment({ loanId, amount, date: formattedDate, method, note });

    alert("Payment recorded successfully");
    loadActiveLoans();

    bootstrap.Modal.getInstance(document.getElementById("paymentModal")).hide();
}


// ===============================
// LOGOUT
// ===============================

    AUTH.adminLogout();
}


// ===============================
// START
// ===============================

loadActiveLoans();



</script>
