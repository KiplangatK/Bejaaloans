.btn-payment{

.section-title{

.document-img{

width:100%;

border:1px solid #ddd;

}






.guarantor-photo{

width:120px;

height:120px;

border-radius:50%;

object-fit:cover;

border:3px solid #2563eb;

}






</style>



</head>





<body>




<!-- =========================
SIDEBAR
========================= -->


<div class="sidebar">



<div class="logo">

<i class="fa-solid fa-building-columns"></i>

Bejja Credit

</div>





<a href="admin-dashboard.html">

<i class="fa fa-dashboard"></i>

Dashboard

<a href="registered-clients.html">

<!-- =========================
MAIN CONTENT
========================= -->


<div class="main">





<div class="topbar">


<h2>

<i class="fa fa-money-bill-wave"></i>

Active Loans

</h2>





<div>

Welcome

<strong id="adminName">

Admin

</strong>

</div>



</div>







<div class="content">





<div class="table-card">



<div class="table-header">


<i class="fa fa-list"></i>

Active Loan List


</div>






<div class="table-responsive">



<table class="table table-hover mb-0">



<thead>


<tr>


<th>

Photo

</th>



<th>

Client Name

</th>



<th>

Phone

</th>



<th>

Loan Amount

</th>



<th>

Balance

</th>



<th>

Interest

</th>



<th>

Loan Date

</th>



<th>

Due Date

</th>



<th>

Action

</th>



</tr>



</thead>




<tbody id="activeLoansTable">


</tbody>



</table>




</div>




</div>





</div>


</div>\
  
<!-- =========================
LOAN DETAILS MODAL
========================= -->


<div class="modal fade" id="loanModal" tabindex="-1">


<div class="modal-dialog modal-xl">


<div class="modal-content">



<div class="modal-header bg-primary text-white">


<h5 class="modal-title">

<i class="fa fa-file-invoice-dollar"></i>

Complete Loan Details

</h5>




<button class="btn-close"

data-bs-dismiss="modal">

</button>



</div>







<div class="modal-body"

id="loanDetails">


</div>






<div class="modal-footer">


<button class="btn btn-secondary"

data-bs-dismiss="modal">

Close

</button>


</div>






</div>


</div>


</div>










<!-- =========================
PAYMENT MODAL
========================= -->


<div class="modal fade" id="paymentModal" tabindex="-1">


<div class="modal-dialog">


<div class="modal-content">



<div class="modal-header bg-success text-white">


<h5 class="modal-title">


<i class="fa fa-money-bill"></i>

Record Payment


</h5>




<button class="btn-close"

data-bs-dismiss="modal">

</button>



</div>







<div class="modal-body">



<input type="hidden"

id="paymentLoanId">






<label class="form-label">

Amount Paid

</label>


<input type="number"

id="paymentAmount"

class="form-control mb-3"

placeholder="Enter amount">







<label class="form-label">

Payment Date

</label>


<input type="date"

id="paymentDate"

class="form-control mb-3">








<label class="form-label">

Payment Method

</label>


<select id="paymentMethod"

class="form-select">


<option>

Cash

</option>


<option>

M-Pesa

</option>


<option>

Bank

</option>


</select>





</div>







<div class="modal-footer">



<button class="btn btn-success"

onclick="savePayment()">


<i class="fa fa-check"></i>

Save Payment


</button>


</div>





</div>


</div>


</div>







<!-- DATABASE -->


<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>




<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>






<script>





// ===============================
// ADMIN CHECK
// ===============================



if(!AUTH.currentAdmin()){


window.location.href="admin-login.html";


}







let admin = AUTH.currentAdmin();



if(admin){


document.getElementById("adminName").innerHTML =

admin.username;


}










// ===============================
// MONEY FORMAT
// ===============================


function money(value){


return "KES " +

Number(value || 0)

.toLocaleString();


}










// ===============================
// LOAD ACTIVE LOANS
// ===============================



function loadActiveLoans(){





let loans = DB.getLoans();




let table = document.getElementById(

"activeLoansTable"

);




table.innerHTML="";







let activeLoans = loans.filter(loan =>


loan.status==="ACTIVE"


);







if(activeLoans.length===0){


table.innerHTML=`


<tr>


<td colspan="9"

class="text-center text-muted p-4">


No active loans found


</td>


</tr>



`;



return;


}









activeLoans.reverse().forEach(loan=>{






let client = DB.getClientById(

loan.clientId

);






if(!client){


return;


}







let balance = Number(

loan.remainingPrincipal || 0

);






table.innerHTML += `





<tr>




<td>


<img src="${client.profilePhoto || 

'https://via.placeholder.com/100'}"

class="profile-img">


</td>





<td>


${client.fullname || "-"}


</td>





<td>


${client.phone || "-"}


</td>







<td>


${money(loan.originalPrincipal)}


</td>







<td>


${money(balance)}


</td>







<td>


${money(balance * 0.20)}


</td>







<td>


${loan.loanDate || "-"}


</td>






<td>


<span class="badge bg-danger">


${loan.dueDate || "-"}


</span>


</td>







<td>



<button

class="btn btn-view btn-sm mb-1"

onclick="viewLoan(${loan.id})">


<i class="fa fa-eye"></i>

Details


</button>






<button

class="btn btn-payment btn-sm"

onclick="openPayment(${loan.id})">


<i class="fa fa-money-bill"></i>

Payment


</button>



</td>






</tr>




`;





});






}












// ===============================
// VIEW COMPLETE LOAN
// ===============================



function viewLoan(id){



let loan = DB.getLoan(id);




if(!loan){

return;

}






let client = DB.getClientById(

loan.clientId

);







document.getElementById(

"loanDetails"

).innerHTML = `






<div class="section-title">


<i class="fa fa-user"></i>

Client Information


</div>







<div class="detail-box">


<div class="row">



<div class="col-md-4 text-center">



<img src="${client.profilePhoto || 

'https://via.placeholder.com/120'}"

class="guarantor-photo">





<h5 class="mt-3">

${client.fullname}

</h5>


</div>








<div class="col-md-8">


<p><b>National ID:</b>

${client.nationalID || "-"}

</p>


<p><b>Phone:</b>

${client.phone || "-"}

</p>


<p><b>Occupation:</b>

${client.occupation || "-"}

</p>


<p><b>Employer:</b>

${client.employer || "-"}

</p>


<p><b>Income:</b>

${money(client.monthlyIncome)}

</p>


<p><b>County:</b>

${client.county || "-"}

</p>


<p><b>Address:</b>

${client.address || "-"}

</p>



</div>




</div>



</div>








<div class="section-title">


<i class="fa fa-money-bill"></i>

Loan Information


</div>






<div class="detail-box">


<p><b>Amount:</b>

${money(loan.originalPrincipal)}

</p>


<p><b>Balance:</b>

${money(loan.remainingPrincipal)}

</p>


<p><b>Purpose:</b>

${loan.purpose || "-"}

</p>


<p><b>Interest Rate:</b>

${loan.interestRate}%


</p>


<p><b>Status:</b>

${loan.status}

</p>



</div>







${displayGuarantor(loan.guarantor1,"Guarantor 1")}



${displayGuarantor(loan.guarantor2,"Guarantor 2")}






<div class="section-title">


<i class="fa fa-clock"></i>

Payment History


</div>





<div class="table-responsive">


<table class="table table-bordered">


<thead class="table-primary">


<tr>


<th>Date</th>


<th>Amount</th>


<th>Interest</th>


<th>Principal</th>


<th>Balance</th>


</tr>


</thead>



<tbody>


${loadPaymentRows(loan)}


</tbody>



</table>



</div>




`;







let modal = new bootstrap.Modal(

document.getElementById("loanModal")

);



modal.show();




}
// ===============================
// DISPLAY GUARANTOR DETAILS
// ===============================


function displayGuarantor(g,title){



if(!g){


return "";


}






return `



<div class="section-title">


<i class="fa fa-users"></i>

${title}


</div>





<div class="detail-box">



<div class="row">





<div class="col-md-3 text-center">


<img src="${g.photo || 

'https://via.placeholder.com/120'}"

class="guarantor-photo">



<h6 class="mt-2">

${g.name || "-"}

</h6>



</div>








<div class="col-md-9">


<p>

<b>National ID:</b>

${g.id || "-"}

</p>




<p>

<b>Phone:</b>

${g.phone || "-"}

</p>





<p>

<b>Relationship:</b>

${g.relationship || "-"}

</p>





<p>

<b>Address:</b>

${g.address || "-"}

</p>



</div>





</div>








<hr>



<div class="row">



<div class="col-md-6">


<h6 class="text-primary">

ID Front

</h6>



<img src="${g.idFront || 

'https://via.placeholder.com/300'}"

class="document-img">


</div>





<div class="col-md-6">


<h6 class="text-primary">

ID Back

</h6>



<img src="${g.idBack || 

'https://via.placeholder.com/300'}"

class="document-img">


</div>



</div>




</div>





`;



}












// ===============================
// PAYMENT HISTORY ROWS
// ===============================


function loadPaymentRows(loan){



if(!loan.payments || loan.payments.length===0){



return `


<tr>


<td colspan="5"

class="text-center text-muted">


No payments recorded


</td>


</tr>



`;



}






let rows="";





loan.payments.forEach(p=>{



rows += `



<tr>


<td>

${p.date || "-"}

</td>




<td>

${money(p.amount)}

</td>




<td>

${money(p.interestPaid)}

</td>




<td>

${money(p.principalPaid)}

</td>




<td>

${money(p.balance)}

</td>



</tr>



`;



});





return rows;



}











// ===============================
// OPEN PAYMENT MODAL
// ===============================


function openPayment(id){



document.getElementById(

"paymentLoanId"

).value=id;





document.getElementById(

"paymentAmount"

).value="";





document.getElementById(

"paymentDate"

).value = 

new Date()

.toISOString()

.split("T")[0];






let modal = new bootstrap.Modal(

document.getElementById("paymentModal")

);



modal.show();



}












// ===============================
// SAVE PAYMENT
// ===============================



function savePayment(){





let id = Number(

document.getElementById(

"paymentLoanId"

).value

);






let amount = Number(

document.getElementById(

"paymentAmount"

).value

);





let date = document.getElementById(

"paymentDate"

).value;






let method = document.getElementById(

"paymentMethod"

).value;







if(amount<=0){



alert("Enter valid payment amount");

return;


}








let loans = DB.getLoans();




let loan = loans.find(l=>l.id===id);





if(!loan){

return;

}







let balance = Number(

loan.remainingPrincipal ||

loan.originalPrincipal ||

0

);







let interest = balance * 0.20;





let payment = amount;






let interestPaid=0;

let principalPaid=0;








// PAY INTEREST FIRST


if(payment >= interest){



interestPaid = interest;


payment -= interest;



}

else{


interestPaid = payment;


payment=0;


}









// REMAINING REDUCES PRINCIPAL


if(payment>0){



principalPaid = payment;


balance -= principalPaid;


}







if(balance < 0){



balance=0;


}









loan.remainingPrincipal = balance;







if(!loan.payments){


loan.payments=[];


}








loan.payments.push({



date:date,


amount:amount,


method:method,


interestPaid:interestPaid,


principalPaid:principalPaid,


balance:balance



});











// COMPLETE LOAN


if(balance===0){



loan.status="COMPLETED";


}









localStorage.setItem(

"loans",

JSON.stringify(loans)

);








alert(

"Payment recorded successfully"

);







loadActiveLoans();






bootstrap.Modal.getInstance(

document.getElementById(

"paymentModal"

)

).hide();






}











// ===============================
// START PAGE
// ===============================


loadActiveLoans();



</script>




</body>
