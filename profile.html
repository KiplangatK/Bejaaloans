<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>My Profile | Bejja Credit</title>



<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

}



body{

background:#edf4ff;

font-family:'Segoe UI',Tahoma,sans-serif;

}



/* HEADER */


.header{

background:linear-gradient(135deg,#0F4C81,#2563EB);

color:white;

padding:25px;

border-radius:0 0 25px 25px;

box-shadow:0 5px 20px rgba(0,0,0,.2);

}





.container{

max-width:1100px;

}




/* PROFILE CARD */


.profile-card{

background:white;

border-radius:25px;

padding:30px;

box-shadow:0 10px 30px rgba(0,0,0,.12);

}





.profile-photo{

width:160px;

height:160px;

border-radius:50%;

object-fit:cover;

border:5px solid #2563EB;

}





.name{

font-size:28px;

font-weight:bold;

color:#0F4C81;

}





.status{

padding:8px 20px;

border-radius:20px;

background:#198754;

color:white;

display:inline-block;

}





/* SECTION */


.section-title{

background:#0F4C81;

color:white;

padding:12px 18px;

border-radius:12px;

margin-top:25px;

margin-bottom:20px;

}





.detail-box{

background:#f8fbff;

padding:15px;

border-radius:12px;

border-left:4px solid #2563EB;

margin-bottom:15px;

}





.detail-box label{

font-weight:bold;

color:#0F4C81;

display:block;

}





.form-control{

height:50px;

border-radius:12px;

}





textarea.form-control{

height:auto;

}





/* DOCUMENTS */


.document-card{

background:#f8f9fa;

border-radius:15px;

padding:15px;

text-align:center;

border:1px dashed #2563EB;

}





.document-img{

width:100%;

height:180px;

object-fit:contain;

border-radius:10px;

}





.btn-save{

background:#2563EB;

color:white;

height:50px;

border-radius:12px;

font-size:18px;

font-weight:bold;

}





.btn-save:hover{

background:#0F4C81;

color:white;

}



.alert{

display:none;

}


</style>


</head>



<body>



<!-- DATABASE -->


<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>




<script>


if(!AUTH.currentClient()){


window.location.href="client-portal.html";


}


</script>






<!-- HEADER -->


<div class="header text-center">


<h2>


<i class="fa-solid fa-building-columns"></i>


BEJJA LOAN CREDIT


</h2>


<p>

My Profile

</p>


</div>







<div class="container py-4">


<!-- NAVIGATION -->

<div class="mb-4">

<a href="client-dashboard.html" class="btn btn-primary">

<i class="fa fa-arrow-left"></i> Back to Dashboard

</a>

<a href="#" onclick="AUTH.clientLogout()" class="btn btn-danger float-end">

<i class="fa fa-right-from-bracket"></i> Logout

</a>

</div>



<div id="successBox"

class="alert alert-success">

</div>




<div id="errorBox"

class="alert alert-danger">

</div>








<div class="profile-card">





<!-- PROFILE HEADER -->


<div class="text-center">



<img id="profilePhoto"

class="profile-photo"

src="">





<h3 class="name mt-3"

id="clientName">

</h3>




<span class="status">

ACTIVE CLIENT

</span>



</div>





<hr>






<!-- PERSONAL DETAILS -->


<h5 class="section-title">

<i class="fa fa-user"></i>

Personal Information

</h5>




<div class="row">



<div class="col-md-6">


<div class="detail-box">

<label>

Full Name

</label>


<input

id="fullname"

class="form-control"

readonly>


</div>


</div>






<div class="col-md-6">


<div class="detail-box">

<label>

National ID

</label>


<input

id="nationalID"

class="form-control"

readonly>


</div>


</div>






<div class="col-md-6">


<div class="detail-box">

<label>

Phone Number

</label>


<input

id="phone"

class="form-control">


</div>


</div>






<div class="col-md-6">


<div class="detail-box">

<label>

Email

</label>


<input

id="email"

class="form-control">


</div>


</div>



</div>



<!-- =========================
     MORE CLIENT DETAILS
========================= -->


<h5 class="section-title">

<i class="fa fa-briefcase"></i>

Employment Information

</h5>




<div class="row">



<div class="col-md-6">


<div class="detail-box">


<label>

Occupation

</label>


<input

id="occupation"

class="form-control">


</div>


</div>






<div class="col-md-6">


<div class="detail-box">


<label>

Employer / Business

</label>


<input

id="employer"

class="form-control">


</div>


</div>






<div class="col-md-6">


<div class="detail-box">


<label>

Monthly Income

</label>


<input

type="number"

id="income"

class="form-control">


</div>


</div>






<div class="col-md-6">


<div class="detail-box">


<label>

County

</label>


<input

id="county"

class="form-control">


</div>


</div>





<div class="col-12">


<div class="detail-box">


<label>

Physical Address

</label>


<textarea

id="address"

class="form-control"

rows="3"></textarea>


</div>


</div>



</div>









<!-- =========================
     DOCUMENTS
========================= -->


<h5 class="section-title">

<i class="fa fa-file"></i>

Verification Documents

</h5>





<div class="row">





<div class="col-md-4 mb-3">


<div class="document-card">


<h6>

Profile Photo

</h6>



<img

id="documentProfile"

class="document-img">



</div>


</div>








<div class="col-md-4 mb-3">


<div class="document-card">


<h6>

National ID Front

</h6>



<img

id="idFront"

class="document-img">



</div>


</div>








<div class="col-md-4 mb-3">


<div class="document-card">


<h6>

National ID Back

</h6>



<img

id="idBack"

class="document-img">



</div>


</div>






</div>







<!-- SAVE BUTTON -->


<div class="text-center mt-4">


<button

onclick="saveProfile()"

class="btn btn-save w-100">


<i class="fa fa-save"></i>

Save Profile Changes


</button>


</div>





<!-- =========================
     CHANGE PASSWORD SECTION
========================= -->


<h5 class="section-title mt-4">

<i class="fa fa-lock"></i>

Change Password

</h5>




<div class="row">



<div class="col-md-6">


<div class="detail-box">


<label>

New Password

</label>



<input

type="password"

id="newPassword"

class="form-control"

placeholder="Enter new password">


</div>


</div>






<div class="col-md-6">


<div class="detail-box">


<label>

Confirm Password

</label>



<input

type="password"

id="confirmPassword"

class="form-control"

placeholder="Confirm password">


</div>


</div>



</div>



<div class="text-center mt-3 mb-4">


<button

onclick="changePassword()"

class="btn btn-warning"

style="height:50px;border-radius:12px;font-weight:bold;">



<i class="fa fa-key"></i>

Update Password


</button>


</div>








</div>

</div>









<script>


// =========================
// LOAD CLIENT PROFILE
// =========================



document.addEventListener(

"DOMContentLoaded",

()=>{


let client = AUTH.currentClient();




if(!client){


window.location.href="client-portal.html";


return;


}







// HEADER


document.getElementById(

"clientName"

).innerHTML =

client.fullname;









// PROFILE IMAGE


document.getElementById(

"profilePhoto"

).src =

client.profilePhoto ||

"https://via.placeholder.com/160";








// PERSONAL DETAILS


document.getElementById(

"fullname"

).value =

client.fullname || "";




document.getElementById(

"nationalID"

).value =

client.nationalID || "";





document.getElementById(

"phone"

).value =

client.phone || "";





document.getElementById(

"email"

).value =

client.email || "";








// EMPLOYMENT


document.getElementById(

"occupation"

).value =

client.occupation || "";





document.getElementById(

"employer"

).value =

client.employer || "";





document.getElementById(

"income"

).value =

client.monthlyIncome || "";





document.getElementById(

"county"

).value =

client.county || "";





document.getElementById(

"address"

).value =

client.address || "";








// DOCUMENTS


document.getElementById(

"documentProfile"

).src =

client.profilePhoto ||

"";





document.getElementById(

"idFront"

).src =

client.idFront ||

"";





document.getElementById(

"idBack"

).src =

client.idBack ||

"";







});



</script>



<script>


// =========================
// SAVE PROFILE CHANGES
// =========================



async function saveProfile(){



let client = AUTH.currentClient();



if(!client){

return;

}






client.phone =

document.getElementById("phone").value.trim();





client.email =

document.getElementById("email").value.trim();





client.occupation =

document.getElementById("occupation").value.trim();





client.employer =

document.getElementById("employer").value.trim();





client.monthlyIncome =

document.getElementById("income").value.trim();





client.county =

document.getElementById("county").value.trim();





client.address =

document.getElementById("address").value.trim();







// UPDATE DATABASE


await DB.updateClient(client);





// UPDATE SESSION


await AUTH.refreshClientSession();








let success = document.getElementById(

"successBox"

);



success.innerHTML = `

<i class="fa fa-check-circle"></i>

Profile updated successfully.

`;



success.style.display="block";






setTimeout(()=>{


success.style.display="none";


},3000);




}











// =========================
// CHANGE PASSWORD
// =========================



async function changePassword(){



let client = AUTH.currentClient();



let pass = document.getElementById(

"newPassword"

).value.trim();





let confirm = document.getElementById(

"confirmPassword"

).value.trim();






let error = document.getElementById(

"errorBox"

);







if(pass===""){


error.innerHTML =

"Please enter new password.";


error.style.display="block";


return;


}







if(pass !== confirm){



error.innerHTML =

"Passwords do not match.";


error.style.display="block";


return;


}







client.password = pass;






await DB.updateClient(client);






await AUTH.refreshClientSession();







let success = document.getElementById(

"successBox"

);



success.innerHTML = `

<i class="fa fa-check-circle"></i>

Password changed successfully.

`;



success.style.display="block";





document.getElementById(

"newPassword"

).value="";



document.getElementById(

"confirmPassword"

).value="";





}






</script>





<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>

</html>
