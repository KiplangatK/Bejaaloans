<!-- DATABASE -->

<script>


/* ADMIN SECURITY */

if(!AUTH.currentAdmin()){
    window.location.href="admin-login.html";
}

let admin = AUTH.currentAdmin();

if(admin){
    document.getElementById("adminName").innerHTML = admin.username;
}


function money(value){
    return "KES " + Number(value || 0).toLocaleString();
}


/* LOAD ALL LOANS */

async function loadAllLoans(){

    let dbReady = false;
    let retries = 0;
    while (!dbReady && retries < 50) {
        try {
            if (window.DB && typeof DB.getLoans === "function") {
                const test = await DB.getLoans();
                if (Array.isArray(test)) { dbReady = true; break; }
            }
        } catch(e) {}
        await new Promise(r => setTimeout(r, 100));
        retries++;
    }
    if (!dbReady) return;

    let loans = await DB.getLoans();
    let table = document.getElementById("allLoansTable");
    table.innerHTML = "";

    if (!Array.isArray(loans) || loans.length === 0) {
        table.innerHTML = `<tr><td colspan="9" class="text-center text-muted p-4">No loans found.</td></tr>`;
        return;
    }

    let today = new Date();
    const DEFAULT_IMG = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

    loans.reverse();

    for (let i = 0; i < loans.length; i++) {
        let loan = loans[i];
        let client = await DB.getClientById(loan.clientId);
        let clientName = client ? client.fullname : "Unknown";
        let clientPhone = client ? client.phone : "-";
        let clientPhoto = client ? (client.profilePhoto || DEFAULT_IMG) : DEFAULT_IMG;

        let balance = Number(loan.remainingPrincipal || 0);

        // Determine status
        let statusBadge = "";

        if (loan.status === "COMPLETED" || balance <= 0) {
            statusBadge = `<span class="badge bg-secondary badge-status">COMPLETED</span>`;
        } else if (loan.dueDate) {
            const parts = loan.dueDate.split("/");
            if (parts.length === 3) {
                const dueDate = new Date(parts[2], parts[1] - 1, parts[0]);
                if (dueDate < today) {
                    statusBadge = `<span class="badge bg-danger badge-status">LATE</span>`;
                } else {
                    statusBadge = `<span class="badge bg-success badge-status">ACTIVE</span>`;
                }
            } else {
                statusBadge = `<span class="badge bg-success badge-status">ACTIVE</span>`;
            }
        } else {
            statusBadge = `<span class="badge bg-success badge-status">ACTIVE</span>`;
        }

        table.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td><img src="${clientPhoto}" class="profile-img"></td>
                <td><b>${clientName}</b></td>
                <td>${clientPhone}</td>
                <td>${money(loan.originalPrincipal)}</td>
                <td class="fw-bold text-danger">${money(balance)}</td>
                <td>${loan.dueDate || "-"}</td>
                <td>${statusBadge}</td>
                <td>
                    <button class="btn btn-view btn-sm" onclick="window.location.href='active-loans.html'">
                        <i class="fa fa-eye"></i> View Details
                    </button>
                </td>
            </tr>`;
    }

}


// ===============================
// LOGOUT
// ===============================

function logout(){
    AUTH.adminLogout();
}


// ===============================
// START
// ===============================

loadAllLoans();



</script>
