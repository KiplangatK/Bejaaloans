<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quick Test | Bejja</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#edf4ff; font-family:'Segoe UI',sans-serif;">

<div class="container py-4">
    <div class="card shadow mx-auto" style="max-width:700px; border-radius:20px;">
        <div class="card-body p-4">
            <h3 class="text-center mb-4">🚀 Quick System Test</h3>
            
            <div id="log" class="bg-dark text-light p-3 rounded" style="height:400px; overflow-y:auto; font-family:monospace; font-size:13px;">
                <div>Ready to test...</div>
            </div>
            
            <button class="btn btn-success w-100 mt-3 btn-lg" onclick="runTest()">
                <i class="fa fa-play"></i> Run Full Test
            </button>
            
            <button class="btn btn-danger w-100 mt-2" onclick="clearAndTest()">
                <i class="fa fa-trash"></i> Clear All Loans & Test
            </button>
        </div>
    </div>
</div>

<script src="assets/js/database.js"></script>
<script src="assets/js/auth.js"></script>
<script>

function log(msg, color = "#fff") {
    let d = document.getElementById("log");
    d.innerHTML += `<div style="color:${color};margin-top:4px;">${msg}</div>`;
    d.scrollTop = d.scrollHeight;
}

async function clearAndTest() {
    if (!confirm("Delete all loans and applications first?")) return;
    document.getElementById("log").innerHTML = "";
    log("🗑️ Clearing old loans...", "#ffc107");
    let loans = await DB.getLoans();
    for (let l of loans) await DB.deleteLoan(l.id);
    let apps = await DB.getApplications();
    for (let a of apps) await DB.deleteApplication(a.id);
    log("✅ Cleared " + loans.length + " loans and " + apps.length + " applications.", "#198754");
    log("");
    runTest();
}

async function runTest() {
    document.getElementById("log").innerHTML = "";
    log("🚀 Starting test...", "#ffc107");
    
    try {
        // Generate random phone and ID
        let phone = "07" + Math.floor(10000000 + Math.random() * 90000000);
        let nationalID = String(Math.floor(10000000 + Math.random() * 90000000));
        
        // 1. Register client
        log("📝 Registering client...", "#0dcaf0");
        log("   Phone: " + phone, "#888");
        log("   Password: demo123", "#888");
        
        let result = await AUTH.registerClient({
            fullname: "Demo User",
            nationalID: nationalID,
            phone: phone,
            email: "demo@test.com",
            occupation: "Tester",
            employer: "Demo Inc",
            monthlyIncome: "30000",
            county: "Nairobi",
            address: "123 Demo Street",
            password: "demo123"
        });
        if (!result.success) { log("❌ Register failed: " + result.message, "#dc3545"); return; }
        log("✅ Client registered! ID: " + result.client.id, "#198754");
        let clientId = result.client.id;
        
        // 2. Login client
        log("🔑 Logging in client...", "#0dcaf0");
        let login = await AUTH.clientLogin(phone, "demo123");
        if (!login.success) { log("❌ Login failed: " + login.message, "#dc3545"); return; }
        log("✅ Client logged in!", "#198754");
        
        // 3. Submit loan application
        log("📋 Submitting loan application (KES 10,000)...", "#0dcaf0");
        let app = await DB.addApplication({
            clientId: clientId,
            amount: 10000,
            purpose: "Business",
            monthlyInterest: 2000,
            client: { fullname: "Demo User", nationalID: nationalID, phone: phone },
            guarantor1: { name: "Guarantor 1", id: "22222222", phone: "0722222222", relationship: "Friend", address: "456 Street" },
            guarantor2: { name: "Guarantor 2", id: "33333333", phone: "0733333333", relationship: "Relative", address: "789 Street" }
        });
        log("✅ Application submitted! ID: " + app.id, "#198754");
        
        // 4. Login as admin
        log("🔑 Logging in admin...", "#0dcaf0");
        let adminLogin = await AUTH.adminLogin("admin", "admin123");
        if (!adminLogin.success) { log("❌ Admin login failed", "#dc3545"); return; }
        log("✅ Admin logged in!", "#198754");
        
        // 5. Approve loan with past due date (15/02/2026)
        log("✅ Approving loan...", "#0dcaf0");
        app.status = "APPROVED";
        await DB.updateApplication(app);
        
        let loan = await DB.addLoan({
            clientId: clientId,
            applicationId: app.id,
            originalPrincipal: 10000,
            remainingPrincipal: 10000,
            purpose: "Business",
            interestRate: 20,
            currentInterest: 2000,
            loanDate: "15/01/2026",
            dueDate: "15/02/2026",
            approvedBy: "admin",
            status: "ACTIVE"
        });
        
        // Calculate months overdue
        let dueDate = new Date(2026, 1, 15);
        let today = new Date();
        let monthsOverdue = 0;
        let checkDate = new Date(dueDate);
        while (true) {
            checkDate.setMonth(checkDate.getMonth() + 1);
            if (today < checkDate) break;
            monthsOverdue++;
        }
        monthsOverdue++;
        
        let monthlyInterest = 2000;
        let totalOutstanding = monthlyInterest * monthsOverdue;
        
        log("✅ Loan approved! ID: " + loan.id, "#198754");
        log("📅 Due Date: 15/02/2026", "#fff");
        log("📊 Months Overdue: " + monthsOverdue, "#ffc107");
        log("💰 Monthly Interest: KES " + monthlyInterest.toLocaleString(), "#fff");
        log("💰 Total Outstanding Interest: KES " + totalOutstanding.toLocaleString(), "#ffc107");
        log("💰 Principal: KES 10,000", "#fff");
        
        // 6. Verify
        let loans = await DB.getLoans();
        let clients = await DB.getClients();
        let apps2 = await DB.getApplications();
        
        log("", "#fff");
        log("══════════════════════════", "#ffc107");
        log("✅ TEST COMPLETE!", "#198754");
        log("📊 Clients: " + clients.length, "#fff");
        log("📊 Applications: " + apps2.length, "#fff");
        log("📊 Loans: " + loans.length, "#fff");
        log("", "#fff");
        log("👉 Now check these pages:", "#0dcaf0");
        log("   ✅ late-loans.html — 1 late loan, KES " + totalOutstanding.toLocaleString() + " overdue", "#fff");
        log("   ✅ active-loans.html — empty (due date passed)", "#fff");
        log("   ✅ admin-dashboard.html — 1 late loan", "#fff");
        log("   ✅ registered-clients.html — Demo User", "#fff");
        log("", "#fff");
        log("🧪 Test these scenarios:", "#0dcaf0");
        log("   1. Pay KES 5,000 → loan stays in late list (partial)", "#fff");
        log("   2. Pay KES " + totalOutstanding.toLocaleString() + " → loan moves to active loans", "#fff");
        log("   3. Pay extra → reduces principal", "#fff");
        
    } catch(e) {
        log("❌ Error: " + e.message, "#dc3545");
        console.error(e);
    }
}

</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</body>
</html>
