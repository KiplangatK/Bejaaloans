<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Client Portal | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

font-family:'Poppins',sans-serif;

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

}



.login-card{

width:430px;

border:none;

border-radius:20px;

box-shadow:0 20px 40px rgba(0,0,0,.25);

overflow:hidden;

}



.logo{

font-size:60px;

color:#2563EB;

}



.form-control{

height:50px;

border-radius:12px;

}



.input-group-text{

border-radius:12px 0 0 12px;

}



.btn-login{

height:50px;

border-radius:12px;

font-size:18px;

font-weight:600;

}



#errorMessage{

display:none;

}


</style>


</head>



<body>




<div class="card login-card">


<div class="card-body p-5">





<div class="text-center mb-4">


<i class="fa-solid fa-building-columns logo"></i>


<h3 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h3>



<p class="text-muted">

Client Portal Login

</p>


</div>








<div id="errorMessage" class="alert alert-danger"></div>








<form id="loginForm">






<div class="mb-3">


<label class="fw-semibold">

Phone Number

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa fa-phone"></i>

</span>



<input

type="tel"

id="phone"

class="form-control"

placeholder="07XXXXXXXX"

required>



</div>


</div>








<div class="mb-3">


<label class="fw-semibold">

Password

</label>




<div class="input-group">


<span class="input-group-text">

<i class="fa fa-lock"></i>

</span>



<input

type="password"

id="password"

class="form-control"

placeholder="Enter Password"

required>



</div>


</div>








<div class="text-end mb-4">


<a href="#" class="text-decoration-none">

Forgot Password?

</a>


</div>








<button

type="submit"

class="btn btn-primary w-100 btn-login">


<i class="fa fa-right-to-bracket"></i>


Login


</button>






</form>









<hr>








<div class="text-center">


<p>

Don't have an account?

</p>






<a href="register.html"

class="btn btn-outline-primary rounded-pill">


<i class="fa fa-user-plus"></i>


Create New Account


</a>








<br><br>








<a href="../index.html"

class="text-decoration-none">


<i class="fa fa-arrow-left"></i>


Back to Homepage


</a>





</div>






</div>

</div>









<!-- DATABASE -->
<script src="assets/js/database.js"></script>
<script src="assets/js/auth.js"></script>

<script>

document.getElementById("loginForm")
.addEventListener("submit",function(e){

e.preventDefault();


let phone=document.getElementById("phone").value.trim();

let password=document.getElementById("password").value.trim();

let errorBox=document.getElementById("errorMessage");


errorBox.style.display="none";


// GET CLIENTS

let clients = JSON.parse(
localStorage.getItem("bejja_clients")
) || [];



// FIND CLIENT

let client = clients.find(c => 
c.phone === phone
);



if(!client){

errorBox.innerHTML="Phone number not registered.";

errorBox.style.display="block";

return;

}




if(client.password !== password){


errorBox.innerHTML="Incorrect password.";

errorBox.style.display="block";

return;


}



// SAVE LOGIN

localStorage.setItem(
"currentClient",
JSON.stringify(client)
);



// OPEN DASHBOARD

window.location.href="../client-portal.html";


});


</script>







</body>

</html>
