<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Admin Login | Bejja Loan Credit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>


body{

background:linear-gradient(135deg,#0F4C81,#2563EB);

min-height:100vh;

display:flex;

align-items:center;

justify-content:center;

font-family:Poppins,sans-serif;

}



.login-card{

width:430px;

border:none;

border-radius:25px;

box-shadow:0 20px 40px rgba(0,0,0,.3);

}



.logo{

font-size:65px;

color:#2563EB;

}



.form-control{

height:50px;

border-radius:12px;

}



.btn-login{

height:52px;

border-radius:12px;

font-size:18px;

font-weight:600;

}



#errorBox{

display:none;

}



</style>


</head>




<body>





<div class="card login-card">


<div class="card-body p-5">





<div class="text-center mb-4">


<i class="fa-solid fa-user-shield logo"></i>



<h3 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h3>



<p class="text-muted">

Administrator Portal

</p>


</div>







<div id="errorBox"

class="alert alert-danger">

</div>








<form id="adminLoginForm">






<div class="mb-3">


<label class="fw-semibold">

Username

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa fa-user"></i>

</span>



<input

type="text"

id="username"

class="form-control"

placeholder="Enter username"

required>


</div>


</div>









<div class="mb-3">


<label class="fw-semibold">

Password

</label>



<div class="input-group">


<span class="input-group-text">

<i class="fa fa-lock"></i>

</span>



<input

type="password"

id="password"

class="form-control"

placeholder="Enter password"

required>


</div>


</div>










<button

type="submit"

class="btn btn-primary w-100 btn-login">


<i class="fa fa-right-to-bracket"></i>

Login


</button>





</form>








<hr>







<div class="text-center">


<a href="index.html"

class="text-decoration-none">


<i class="fa fa-arrow-left"></i>

Back Home


</a>


</div>







</div>

</div>









<!-- DATABASE -->

<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>








<script>


document

.getElementById("adminLoginForm")

.addEventListener("submit",async function(e){



e.preventDefault();




let username = 

document.getElementById("username").value.trim();




let password =

document.getElementById("password").value.trim();





let errorBox =

document.getElementById("errorBox");



errorBox.style.display="none";

errorBox.innerHTML="";








// Wait for DB to be ready

let retries = 0;
while (!window.DB || typeof DB.getStaff !== "function") {
    await new Promise(r => setTimeout(r, 200));
    retries++;
    if (retries > 25) {
        errorBox.innerHTML = "System is loading. Please try again.";
        errorBox.style.display = "block";
        return;
    }
}



// LOGIN CHECK


let result = await AUTH.adminLogin(

username,

password

);








if(!result.success){



errorBox.innerHTML = result.message;


errorBox.style.display="block";


return;


}







// SUCCESSFUL LOGIN — redirect to dashboard


window.location.href="admin-dashboard.html";






});



</script>






</body>

</html>
