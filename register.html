<!DOCTYPE html>
<html lang="en">

<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">



<style>

<body>



<div class="card">


<div class="card-body p-5">



<div class="text-center mb-4">


<i class="fa-solid fa-building-columns logo"></i>



<h2 class="fw-bold mt-3">

BEJJA LOAN CREDIT

</h2>



<p class="text-muted">

Create Client Account

</p>


</div>






<div id="errorBox" class="alert alert-danger"></div>


<div id="successBox" class="alert alert-success"></div>







<form id="registerForm">


<div class="row">





<div class="col-md-6 mb-3">

<div class="col-md-6 mb-3">

<div class="col-md-6 mb-3">

<div class="col-md-6 mb-3">

<div class="col-md-6 mb-3">

<div class="col-12 mb-3">

</label>

id="address"

required></textarea>

<div class="col-12 mb-3">


<h5 class="fw-bold">

<i class="fa fa-file"></i>

Upload Verification Documents

</h5>

<div class="col-md-4 mb-3">

<input

</div>

<div class="col-md-4 mb-3">


<div class="upload-box">

National ID Front

</label>


<input

type="file"

id="idFront"

class="form-control"

accept="image/*"

required>



<img

id="frontPreview"

</div>








<div class="col-md-4 mb-3">


<div class="upload-box">

National ID Back

<input

type="file"

id="idBack"

required>



<img

id="backPreview"

<div class="col-md-6 mb-3">


<label class="fw-semibold">

Password

<input

Confirm Password

required>

</div>

type="submit"

class="btn btn-primary w-100">


<i class="fa fa-user-plus"></i>


Create Account


</button>





</form>







<div class="text-center mt-4">


Already have an account?


<a href="client-portal.html">

Login Here

</a>



</div>





</div>





<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>





<script>


/* ============================
   IMAGE PREVIEW
============================ */


function previewImage(input,target){


const file=input.files[0];


if(file){


const reader=new FileReader();



reader.onload=function(e){


target.src=e.target.result;


target.style.display="block";


}



reader.readAsDataURL(file);



}


}





document.getElementById("profilePhoto")
.onchange=function(){


previewImage(

this,

document.getElementById("profilePreview")

);


}





document.getElementById("idFront")
.onchange=function(){


previewImage(

this,

document.getElementById("frontPreview")

);


}





document.getElementById("idBack")
.onchange=function(){


previewImage(

this,

document.getElementById("backPreview")

);


}







/* ============================
   IMAGE COMPRESSION
============================ */



function compressImage(file){


return new Promise(resolve=>{


const reader=new FileReader();



reader.onload=function(e){



const img=new Image();



img.onload=function(){



const canvas=document.createElement("canvas");



const maxWidth=800;



let width=img.width;

let height=img.height;





if(width>maxWidth){


height = height * maxWidth / width;


width = maxWidth;


}




canvas.width=width;

canvas.height=height;




const ctx=canvas.getContext("2d");


ctx.drawImage(
img,
0,
0,
width,
height
);





resolve(

canvas.toDataURL(
"image/jpeg",
0.7
)

);




}





img.src=e.target.result;



}



reader.readAsDataURL(file);



});



}








/* ============================
   REGISTER CLIENT
============================ */



document

.getElementById("registerForm")

.addEventListener("submit",async function(e){



e.preventDefault();




const errorBox =
document.getElementById("errorBox");



const successBox =
document.getElementById("successBox");




errorBox.style.display="none";

successBox.style.display="none";







// GET DETAILS


const fullname =
document.getElementById("fullname").value.trim();



const nationalID =
document.getElementById("nationalID").value.trim();



const phone =
document.getElementById("phone").value.trim();



const email =
document.getElementById("email").value.trim();



const occupation =
document.getElementById("occupation").value.trim();



const employer =
document.getElementById("employer").value.trim();



const income =
document.getElementById("income").value.trim();



const county =
document.getElementById("county").value.trim();



const address =
document.getElementById("address").value.trim();




const password =
document.getElementById("password").value;



const confirmPassword =
document.getElementById("confirmPassword").value;







// CHECK EMPTY FIELDS


if(

fullname==="" ||

nationalID==="" ||

phone==="" ||

occupation==="" ||

income==="" ||

county==="" ||

address==="" ||

password==="" ||

confirmPassword===""

){


errorBox.innerHTML=

"Please fill all required fields.";


errorBox.style.display="block";


return;


}







// CHECK DOCUMENTS


if(

document.getElementById("profilePhoto").files.length===0 ||

document.getElementById("idFront").files.length===0 ||

document.getElementById("idBack").files.length===0

){


errorBox.innerHTML=

"Please upload all verification documents.";


errorBox.style.display="block";


return;


}








// CHECK PASSWORD


if(password!==confirmPassword){



errorBox.innerHTML=

"Passwords do not match.";



errorBox.style.display="block";



return;


}







// CHECK PHONE


if(!/^07\d{8}$/.test(phone)){



errorBox.innerHTML=

"Invalid phone number format. Use 07XXXXXXXX.";



errorBox.style.display="block";



return;


}








// COMPRESS IMAGES


const profilePhoto =

await compressImage(

document.getElementById("profilePhoto").files[0]

);



const idFront =

await compressImage(

document.getElementById("idFront").files[0]

);



const idBack =

await compressImage(

document.getElementById("idBack").files[0]

);








// CLIENT OBJECT


const client={


fullname:fullname,


nationalID:nationalID,


phone:phone,


email:email,


occupation:occupation,


employer:employer,


monthlyIncome:income,


county:county,


address:address,



profilePhoto:profilePhoto,


idFront:idFront,


idBack:idBack,



password:password


};








// SAVE ACCOUNT


const result =

AUTH.registerClient(client);








if(!result.success){


errorBox.innerHTML=result.message;


errorBox.style.display="block";


return;


}









// SUCCESS


successBox.innerHTML=`

<h4>

<i class="fa fa-check-circle"></i>

Account Created Successfully

</h4>


<p>

Your Bejja Credit account has been created.

</p>


<a href="client-portal.html"

class="btn btn-primary">

Login Now

</a>

`;




successBox.style.display="block";





document

.getElementById("registerForm")

.reset();





});




</script>




</body>

</html>
</div>
