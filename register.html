<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | Bejja Loan Credit</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">


<style>

body{

background:linear-gradient(135deg,#0F4C81,#2563EB);
font-family:Poppins,sans-serif;
min-height:100vh;
padding:30px;

}


.card{

max-width:950px;
margin:auto;
border:none;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.25);

}


.logo{

font-size:60px;
color:#2563EB;

}


.form-control{

height:50px;
border-radius:12px;

}


textarea.form-control{

height:auto;

}


.btn-primary{

height:50px;
border-radius:12px;
font-size:18px;
font-weight:600;

}


.alert{

display:none;

}


.upload-box{

background:#f8f9fa;
border-radius:15px;
padding:20px;
border:1px dashed #0F4C81;

}


.preview{

width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
display:none;
margin-top:10px;

}


.id-preview{

width:100%;
max-height:200px;
object-fit:contain;
display:none;
margin-top:10px;

}

</style>


</head>


<body>



<div class="card">


<div class="card-body p-5">



<div class="text-center mb-4">


<i class="fa-solid fa-building-columns logo"></i>


<h2 class="fw-bold mt-3">
BEJJA LOAN CREDIT
</h2>


<p class="text-muted">
Create Client Account
</p>


</div>




<div class="alert alert-danger" id="errorBox"></div>

<div class="alert alert-success" id="successBox"></div>





<form id="registerForm">


<div class="row">



<div class="col-md-6 mb-3">

<label>Full Name</label>

<input 
type="text"
id="fullname"
class="form-control"
required>

</div>



<div class="col-md-6 mb-3">

<label>National ID</label>

<input
type="text"
id="nationalID"
class="form-control"
required>

</div>




<div class="col-md-6 mb-3">

<label>Phone Number</label>

<input
type="tel"
id="phone"
class="form-control"
placeholder="07XXXXXXXX"
required>

</div>




<div class="col-md-6 mb-3">

<label>Email</label>

<input
type="email"
id="email"
class="form-control">

</div>




<div class="col-md-6 mb-3">

<label>Occupation</label>

<input
type="text"
id="occupation"
class="form-control"
required>

</div>




<div class="col-md-6 mb-3">

<label>Employer / Business Name</label>

<input
type="text"
id="employer"
class="form-control">

</div>




<div class="col-md-6 mb-3">

<label>Monthly Income</label>

<input
type="number"
id="income"
class="form-control"
required>

</div>




<div class="col-md-6 mb-3">

<label>County</label>

<input
type="text"
id="county"
class="form-control"
required>

</div>




<div class="col-12 mb-3">

<label>Physical Address</label>

<textarea
id="address"
class="form-control"
rows="3"
required></textarea>

</div>





<div class="col-12 mb-3">

<h5 class="fw-bold">

<i class="fa fa-file"></i>
Upload Verification Documents

</h5>

</div>





<div class="col-md-4 mb-3">

<div class="upload-box">

<label>Profile Photo</label>

<input
type="file"
id="profilePhoto"
class="form-control"
accept="image/*"
required>


<img id="profilePreview" class="preview">


</div>

</div>





<div class="col-md-4 mb-3">

<div class="upload-box">

<label>National ID Front</label>

<input
type="file"
id="idFront"
class="form-control"
accept="image/*"
required>


<img id="frontPreview" class="id-preview">


</div>

</div>





<div class="col-md-4 mb-3">

<div class="upload-box">

<label>National ID Back</label>

<input
type="file"
id="idBack"
class="form-control"
accept="image/*"
required>


<img id="backPreview" class="id-preview">


</div>

</div>






<div class="col-md-6 mb-3">

<label>Password</label>

<input
type="password"
id="password"
class="form-control"
required>

</div>




<div class="col-md-6 mb-4">

<label>Confirm Password</label>

<input
type="password"
id="confirmPassword"
class="form-control"
required>

</div>




</div>



<button
type="submit"
class="btn btn-primary w-100">

<i class="fa fa-user-plus"></i>

Create Account

</button>



</form>





<div class="text-center mt-4">

Already have an account?

<a href="../client-portal.html">

Login Here

</a>


</div>



</div>

</div>






<script src="../assets/js/database.js"></script>
<script src="../assets/js/auth.js"></script>





<script>


function previewImage(input,target){


const file=input.files[0];


if(file){


const reader=new FileReader();


reader.onload=function(e){

target.src=e.target.result;

target.style.display="block";

}


reader.readAsDataURL(file);


}

}



profilePhoto.onchange=function(){

previewImage(this,profilePreview);

}


idFront.onchange=function(){

previewImage(this,frontPreview);

}


idBack.onchange=function(){

previewImage(this,backPreview);

}





function compressImage(file){


return new Promise(resolve=>{


const reader=new FileReader();


reader.onload=function(e){


const img=new Image();


img.onload=function(){


const canvas=document.createElement("canvas");


const max=800;


let width=img.width;

let height=img.height;



if(width>max){

height*=max/width;

width=max;

}



canvas.width=width;

canvas.height=height;


canvas.getContext("2d")
.drawImage(img,0,0,width,height);



resolve(
canvas.toDataURL("image/jpeg",0.7)
);


}


img.src=e.target.result;


}


reader.readAsDataURL(file);


});


}






document.getElementById("registerForm")
.addEventListener("submit",async function(e){


e.preventDefault();



const errorBox=document.getElementById("errorBox");

const successBox=document.getElementById("successBox");



errorBox.style.display="none";

successBox.style.display="none";




const password =
document.getElementById("password").value;


const confirmPassword =
document.getElementById("confirmPassword").value;




if(password!==confirmPassword){


errorBox.innerHTML="Passwords do not match.";

errorBox.style.display="block";

return;

}





const phone =
document.getElementById("phone").value.trim();




if(!/^07\d{8}$/.test(phone)){


errorBox.innerHTML="Invalid phone number format.";

errorBox.style.display="block";

return;

}





const client={


fullname:
document.getElementById("fullname").value,


nationalID:
document.getElementById("nationalID").value,


phone:phone,


email:
document.getElementById("email").value,


occupation:
document.getElementById("occupation").value,


employer:
document.getElementById("employer").value,


monthlyIncome:
document.getElementById("income").value,


county:
document.getElementById("county").value,


address:
document.getElementById("address").value,


profilePhoto:
await compressImage(profilePhoto.files[0]),


idFront:
await compressImage(idFront.files[0]),


idBack:
await compressImage(idBack.files[0]),


password:password


};






const result =
AUTH.registerClient(client);





if(!result.success){


errorBox.innerHTML=result.message;

errorBox.style.display="block";

return;

}





successBox.innerHTML=`

<h4>
<i class="fa fa-check-circle"></i>
Congratulations!
</h4>

<p>
Account created successfully.
</p>

<a href="../client-portal.html"
class="btn btn-primary">

Login Now

</a>

`;



successBox.style.display="block";


this.reset();



});



</script>



</body>

</html>
