<!-- DATABASE -->

<script src="assets/js/database.js"></script>

<script src="assets/js/auth.js"></script>








<script>


/* ============================
 IMAGE PREVIEW
============================ */



function previewImage(input,target){



const file=input.files[0];



if(!file){

return;

}



const reader=new FileReader();



reader.onload=function(e){



target.src=e.target.result;


target.style.display="block";



}



reader.readAsDataURL(file);



}







document

.getElementById("profilePhoto")

.addEventListener("change",function(){


previewImage(

this,

document.getElementById("profilePreview")

);


});







document

.getElementById("idFront")

.addEventListener("change",function(){


previewImage(

this,

document.getElementById("frontPreview")

);


});







document

.getElementById("idBack")

.addEventListener("change",function(){


previewImage(

this,

document.getElementById("backPreview")

);


});












/* ============================
 IMAGE COMPRESSION
============================ */


function compressImage(file){



return new Promise(resolve=>{



const reader=new FileReader();




reader.onload=function(e){



const img=new Image();




img.onload=function(){



const canvas=document.createElement("canvas");



let width=img.width;

let height=img.height;



const maxWidth=800;





if(width>maxWidth){



height = height * maxWidth / width;



width=maxWidth;



}





canvas.width=width;


canvas.height=height;





const ctx=canvas.getContext("2d");



ctx.drawImage(

img,

0,

0,

width,

height

);







resolve(

canvas.toDataURL(

"image/jpeg",

0.7

)

);



}






img.src=e.target.result;



}





reader.readAsDataURL(file);



});



}













/* ============================
 CREATE CLIENT ACCOUNT
============================ */



document

.getElementById("registerForm")

.addEventListener("submit",async function(e){



e.preventDefault();






const errorBox=document.getElementById("errorBox");


const successBox=document.getElementById("successBox");




errorBox.style.display="none";


successBox.style.display="none";







// GET VALUES


const fullname =

document.getElementById("fullname").value.trim();




const nationalID =

document.getElementById("nationalID").value.trim();




const phone =

document.getElementById("phone").value.trim();




const email =

document.getElementById("email").value.trim();




const occupation =

document.getElementById("occupation").value.trim();




const employer =

document.getElementById("employer").value.trim();




const income =

document.getElementById("income").value.trim();




const county =

document.getElementById("county").value.trim();




const address =

document.getElementById("address").value.trim();




const password =

document.getElementById("password").value;



const confirmPassword =

document.getElementById("confirmPassword").value;











// VALIDATION


if(

fullname==="" ||

nationalID==="" ||

phone==="" ||

occupation==="" ||

income==="" ||

county==="" ||

address==="" ||

password==="" ||

confirmPassword===""

){


errorBox.innerHTML=

"Please fill all required fields.";


errorBox.style.display="block";


return;


}









if(password !== confirmPassword){



errorBox.innerHTML=

"Passwords do not match.";


errorBox.style.display="block";


return;


}










if(!/^07\d{8}$/.test(phone)){



errorBox.innerHTML=

"Invalid phone number format.";



errorBox.style.display="block";



return;



}













if(

profilePhoto.files.length===0 ||

idFront.files.length===0 ||

idBack.files.length===0

){



errorBox.innerHTML=

"Please upload all verification documents.";



errorBox.style.display="block";



return;



}








// COMPRESS IMAGES


const profile = await compressImage(

profilePhoto.files[0]

);




const front = await compressImage(

idFront.files[0]

);




const back = await compressImage(

idBack.files[0]

);








// ============================
// CLIENT OBJECT
// ============================


const client={



fullname:fullname,


nationalID:nationalID,


phone:phone,


email:email,


occupation:occupation,


employer:employer,


monthlyIncome:income,


county:county,


address:address,



profilePhoto:profile,


idFront:front,


idBack:back,



password:password



};








// ============================
// SAVE USING AUTH ENGINE
// ============================



const result = await AUTH.registerClient(client);







if(!result.success){



errorBox.innerHTML=result.message;



errorBox.style.display="block";



return;



}









// ============================
// SUCCESS MESSAGE
// ============================



successBox.innerHTML=`



<h4>

<i class="fa fa-check-circle"></i>

Account Created Successfully

</h4>



<p>

Your Bejja Credit account has been created successfully.

</p>




<a href="client-portal.html"

class="btn btn-primary">


<i class="fa fa-right-to-bracket"></i>


Login Now


</a>



`;





successBox.style.display="block";







// RESET FORM



document

.getElementById("registerForm")

.reset();





});



</script>
