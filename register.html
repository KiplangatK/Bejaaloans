<script>


// ============================
// STEP NAVIGATION
// ============================

function goToStep1() {
    document.getElementById("formStep1").style.display = "block";
    document.getElementById("formStep2").style.display = "none";
    updateSteps(1);
}

function goToStep2() {
    const fullname = document.getElementById("fullname").value.trim();
    const nationalID = document.getElementById("nationalID").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const occupation = document.getElementById("occupation").value.trim();
    const income = document.getElementById("income").value.trim();
    const county = document.getElementById("county").value;
    const address = document.getElementById("address").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (!fullname || !nationalID || !phone || !occupation || !income || !county || !address || !password || !confirmPassword) {
        showError("Please fill all required fields in Step 1.");
        return;
    }

    if (password !== confirmPassword) {
        showError("Passwords do not match.");
        return;
    }

    if (password.length < 4) {
        showError("Password must be at least 4 characters.");
        return;
    }

    if (!sessionStorage.getItem("idVerified")) {
        showError("Your National ID could not be verified. Please check and try again.");
        return;
    }

    if (!sessionStorage.getItem("phoneVerified")) {
        showError("Please verify your phone number with the OTP code.");
        return;
    }

    document.getElementById("formStep1").style.display = "none";
    document.getElementById("formStep2").style.display = "block";
    updateSteps(2);
}

function updateSteps(activeStep) {
    for (let i = 1; i <= 3; i++) {
        const step = document.getElementById("step" + i);
        step.classList.remove("active", "done");
        if (i < activeStep) step.classList.add("done");
        if (i === activeStep) step.classList.add("active");
    }
}

function showError(msg) {
    const errorBox = document.getElementById("errorBox");
    errorBox.innerHTML = msg;
    errorBox.style.display = "block";
    setTimeout(() => { errorBox.style.display = "none"; }, 4000);
}


// ============================
// AUTO NAME CHECK
// ============================

let nameCheckTimeout;

function autoCheckName() {
    const fullname = document.getElementById("fullname").value.trim();
    const nationalID = document.getElementById("nationalID").value.trim();
    const statusEl = document.getElementById("idStatus");

    if (nameCheckTimeout) clearTimeout(nameCheckTimeout);
    if (!fullname) return;

    nameCheckTimeout = setTimeout(() => {
        if (!/^[a-zA-Z\s'-]+$/.test(fullname)) {
            statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> Name should match ID format (letters only).</span>';
            document.getElementById("fullname").style.border = "2px solid #dc3545";
            sessionStorage.removeItem("idVerified");
            return;
        }

        if (fullname.length < 3) {
            statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> Enter full name as it appears on your ID.</span>';
            document.getElementById("fullname").style.border = "2px solid #dc3545";
            sessionStorage.removeItem("idVerified");
            return;
        }

        document.getElementById("fullname").style.border = "2px solid #4caf50";

        // Re-verify ID together with name
        if (nationalID && nationalID.length >= 6) {
            autoVerifyID();
        }
    }, 500);
}


// ============================
// AUTO ID VERIFICATION
// ============================

let idCheckTimeout;

async function autoVerifyID() {
    const nationalID = document.getElementById("nationalID").value.trim();
    const fullname = document.getElementById("fullname").value.trim();
    const statusEl = document.getElementById("idStatus");

    if (idCheckTimeout) clearTimeout(idCheckTimeout);
    
    sessionStorage.removeItem("idVerified");
    document.getElementById("nationalID").style.border = "";

    if (!nationalID) {
        statusEl.innerHTML = "";
        return;
    }

    if (nationalID.length < 6) {
        statusEl.innerHTML = '<span class="status-checking">Enter at least 6 digits...</span>';
        return;
    }

    if (nationalID.length > 10 || !/^\d+$/.test(nationalID)) {
        statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> Invalid ID format (6-10 digits, numbers only).</span>';
        return;
    }

    // Check name format too
    if (fullname && (!/^[a-zA-Z\s'-]+$/.test(fullname) || fullname.length < 3)) {
        statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> Enter full name as per ID (letters only).</span>';
        return;
    }

    statusEl.innerHTML = '<span class="status-checking"><i class="fa fa-spinner fa-spin"></i> Verifying ID...</span>';

    idCheckTimeout = setTimeout(async () => {
        try {
            const clients = await DB.getClients();
            const existing = clients.find(c => c.nationalID === nationalID);

            if (existing) {
                statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> This ID is already registered.</span>';
                document.getElementById("nationalID").style.border = "2px solid #dc3545";
                return;
            }

            statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> ID verified & name matches format.</span>';
            sessionStorage.setItem("idVerified", "true");
            document.getElementById("nationalID").style.border = "2px solid #4caf50";
            if (fullname) document.getElementById("fullname").style.border = "2px solid #4caf50";

        } catch (e) {
            if (fullname && fullname.length >= 3 && /^[a-zA-Z\s'-]+$/.test(fullname)) {
                statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> ID format accepted.</span>';
                sessionStorage.setItem("idVerified", "true");
                document.getElementById("nationalID").style.border = "2px solid #4caf50";
            }
        }
    }, 800);
}


// ============================
// AUTO PHONE CHECK
// ============================

let phoneCheckTimeout;

function normalizePhone(raw) {
    let phone = raw.replace(/\s+/g, "").replace(/-/g, "");
    if (phone.startsWith("+2547")) phone = "0" + phone.substring(4);
    if (phone.startsWith("+2541")) phone = "0" + phone.substring(4);
    if (phone.startsWith("2547")) phone = "0" + phone.substring(3);
    if (phone.startsWith("2541")) phone = "0" + phone.substring(3);
    return phone;
}

function isValidPhone(raw) {
    const phone = normalizePhone(raw);
    return /^0[17]\d{8}$/.test(phone);
}

async function autoCheckPhone() {
    const rawPhone = document.getElementById("phone").value.trim();
    const statusEl = document.getElementById("phoneStatus");
    const sendBtn = document.getElementById("sendOTPBtn");

    if (phoneCheckTimeout) clearTimeout(phoneCheckTimeout);
    
    sessionStorage.removeItem("phoneVerified");
    document.getElementById("phone").style.border = "";
    document.getElementById("otpBox").style.display = "none";
    sendBtn.disabled = false;
    sendBtn.innerHTML = '<i class="fa fa-paper-plane"></i> Send Code';

    if (!rawPhone) {
        statusEl.innerHTML = "";
        return;
    }

    const phone = normalizePhone(rawPhone);

    if (!isValidPhone(rawPhone)) {
        statusEl.innerHTML = '<span class="status-error">Enter 07XXXXXXXX or +2547XXXXXXXX</span>';
        return;
    }

    statusEl.innerHTML = '<span class="status-checking"><i class="fa fa-spinner fa-spin"></i> Checking...</span>';

    phoneCheckTimeout = setTimeout(async () => {
        try {
            const existing = await DB.getClientByPhone(phone);
            if (existing) {
                statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> This phone number is already registered.</span>';
                return;
            }
            statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Phone available. Click "Send Code" to verify.</span>';
            document.getElementById("phone").style.border = "2px solid #4caf50";
        } catch (e) {
            statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Phone format accepted.</span>';
        }
    }, 800);
}


// ============================
// PHONE VERIFICATION - OTP
// ============================

let generatedOTP = "";

async function sendOTP() {
    const rawPhone = document.getElementById("phone").value.trim();
    const statusEl = document.getElementById("phoneStatus");

    if (!isValidPhone(rawPhone)) {
        statusEl.innerHTML = '<span class="status-error">Enter a valid phone number first.</span>';
        return;
    }

    const phone = normalizePhone(rawPhone);

    const existing = await DB.getClientByPhone(phone);
    if (existing) {
        statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> This phone is already registered.</span>';
        return;
    }

    generatedOTP = String(Math.floor(100000 + Math.random() * 900000));
    console.log("OTP for " + phone + ": " + generatedOTP);
    
    statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Code sent! (Demo: <b>' + generatedOTP + '</b>)</span>';
    
    document.getElementById("otpBox").style.display = "block";
    document.getElementById("sendOTPBtn").disabled = true;
    document.getElementById("sendOTPBtn").innerHTML = '<i class="fa fa-clock"></i> Sent';
    
    document.getElementById("otp1").focus();
}


function otpNext(current, nextId) {
    if (current.value.length === 1 && nextId) {
        document.getElementById(nextId).focus();
    }
}


function verifyOTP() {
    const statusEl = document.getElementById("otpStatus");
    
    const enteredOTP = 
        document.getElementById("otp1").value +
        document.getElementById("otp2").value +
        document.getElementById("otp3").value +
        document.getElementById("otp4").value +
        document.getElementById("otp5").value +
        document.getElementById("otp6").value;

    if (enteredOTP.length < 6) {
        statusEl.innerHTML = '<span class="status-error">Enter the complete 6-digit code.</span>';
        return;
    }

    if (enteredOTP === generatedOTP) {
        statusEl.innerHTML = '<span class="phone-verified"><i class="fa fa-check-circle"></i> Phone verified!</span>';
        sessionStorage.setItem("phoneVerified", "true");
        document.getElementById("phone").style.border = "2px solid #4caf50";
        document.getElementById("otpBox").style.display = "none";
        document.getElementById("sendOTPBtn").innerHTML = '<i class="fa fa-check"></i> Verified';
    } else {
        statusEl.innerHTML = '<span class="status-error"><i class="fa fa-times-circle"></i> Incorrect code. Try again.</span>';
    }
}


/* ============================
 IMAGE PREVIEW
============================ */

function previewImage(input, target) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const img = document.getElementById(target);
        img.src = e.target.result;
        img.style.display = "block";
    };
    reader.readAsDataURL(file);
}

document.getElementById("profilePhoto").addEventListener("change", function() {
    previewImage(this, "profilePreview");
});

document.getElementById("idFront").addEventListener("change", function() {
    previewImage(this, "frontPreview");
});

document.getElementById("idBack").addEventListener("change", function() {
    previewImage(this, "backPreview");
});


/* ============================
 IMAGE COMPRESSION
============================ */

function compressImage(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement("canvas");
                let width = img.width;
                let height = img.height;
                const maxWidth = 800;
                if (width > maxWidth) {
                    height = height * maxWidth / width;
                    width = maxWidth;
                }
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext("2d");
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL("image/jpeg", 0.7));
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    });
}


/* ============================
 CREATE CLIENT ACCOUNT
============================ */

document.getElementById("registerForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const errorBox = document.getElementById("errorBox");
    const successBox = document.getElementById("successBox");

    errorBox.style.display = "none";
    successBox.style.display = "none";

    const fullname = document.getElementById("fullname").value.trim();
    const nationalID = document.getElementById("nationalID").value.trim();
    const rawPhone = document.getElementById("phone").value.trim();
    const phone = normalizePhone(rawPhone);
    const email = document.getElementById("email").value.trim();
    const occupation = document.getElementById("occupation").value.trim();
    const employer = document.getElementById("employer").value.trim();
    const income = document.getElementById("income").value.trim();
    const county = document.getElementById("county").value;
    const address = document.getElementById("address").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
        errorBox.innerHTML = "Passwords do not match.";
        errorBox.style.display = "block";
        return;
    }

    if (!sessionStorage.getItem("idVerified")) {
        errorBox.innerHTML = "Please ensure your National ID is verified.";
        errorBox.style.display = "block";
        return;
    }

    if (!sessionStorage.getItem("phoneVerified")) {
        errorBox.innerHTML = "Please verify your phone number with the OTP code.";
        errorBox.style.display = "block";
        return;
    }

    if (profilePhoto.files.length === 0 || idFront.files.length === 0 || idBack.files.length === 0) {
        errorBox.innerHTML = "Please upload all verification documents.";
        errorBox.style.display = "block";
        return;
    }

    const profile = await compressImage(profilePhoto.files[0]);
    const front = await compressImage(idFront.files[0]);
    const back = await compressImage(idBack.files[0]);

    const client = {
        fullname: fullname,
        nationalID: nationalID,
        phone: phone,
        email: email,
        occupation: occupation,
        employer: employer,
        monthlyIncome: income,
        county: county,
        address: address,
        profilePhoto: profile,
        idFront: front,
        idBack: back,
        password: password
    };

    const result = await AUTH.registerClient(client);

    if (!result.success) {
        errorBox.innerHTML = result.message;
        errorBox.style.display = "block";
        return;
    }

    sessionStorage.removeItem("idVerified");
    sessionStorage.removeItem("phoneVerified");

    successBox.innerHTML = `
        <h4><i class="fa fa-check-circle"></i> Account Created Successfully</h4>
        <p>Your Bejja Credit account has been created successfully.</p>
        <a href="client-portal.html" class="btn btn-primary">
            <i class="fa fa-right-to-bracket"></i> Login Now
        </a>`;
    successBox.style.display = "block";

    document.getElementById("registerForm").reset();
    updateSteps(1);
    goToStep1();

});
