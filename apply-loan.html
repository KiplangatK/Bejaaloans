const client = AUTH.currentClient();

return;

document.getElementById("fullname").value =
client.fullname || "";



document.getElementById("nationalID").value =
client.nationalID || "";



document.getElementById("phone").value =

document.getElementById("occupation").value =

client.profilePhoto;

// INTEREST CALCULATOR


function calculateInterest(){



let amount = Number(

document.getElementById("loanAmount").value

) || 0;



let interest = amount * 0.20;



document.getElementById("monthlyInterest").innerHTML =

"KES " + interest.toLocaleString();



}

<script>


// IMAGE PREVIEW FUNCTION


function previewImage(input,target){



const file=input.files[0];



if(!file){

return;

}



const reader=new FileReader();



reader.onload=function(e){



let img=document.getElementById(target);



img.src=e.target.result;



img.style.display="block";


}



reader.readAsDataURL(file);



}



</script>

================================ -->

onclick="submitLoanApplication()"

<script>



// IMAGE COMPRESSION


function compressImage(file){


return new Promise(resolve=>{


const reader=new FileReader();



reader.onload=function(e){



const img=new Image();



img.onload=function(){



const canvas=document.createElement("canvas");



let width=img.width;

let height=img.height;



const maxWidth=800;



if(width>maxWidth){


height = height * maxWidth / width;


width=maxWidth;


}





canvas.width=width;

canvas.height=height;



const ctx=canvas.getContext("2d");



ctx.drawImage(

img,

0,

0,

width,

height

);





resolve(

canvas.toDataURL(

"image/jpeg",

0.7

)

);



}



img.src=e.target.result;



}



reader.readAsDataURL(file);



});


}









// SUBMIT LOAN APPLICATION



async function submitLoanApplication(){



const errorBox=document.getElementById("errorBox");

const successBox=document.getElementById("successBox");



errorBox.style.display="none";

successBox.style.display="none";






const client=AUTH.currentClient();



if(!client){


window.location.href="client-portal.html";


return;


}







// LOAN DETAILS


const amount=Number(

document.getElementById("loanAmount").value

);



const purpose=

document.getElementById("purpose").value.trim();







if(amount<=0){


errorBox.innerHTML=

"Please enter a valid loan amount.";


errorBox.style.display="block";


return;


}








// GUARANTOR VALIDATION


const required=[


"g1_name",

"g1_id",

"g1_phone",

"g1_relationship",

"g1_address",



"g2_name",

"g2_id",

"g2_phone",

"g2_relationship",

"g2_address"


];






for(let id of required){



if(document.getElementById(id).value.trim()===""){


errorBox.innerHTML=

"Please fill all guarantor details.";


errorBox.style.display="block";


return;


}



}








// CHECK UPLOADS



const files=[


"g1_photo",

"g1_idfront",

"g1_idback",


"g2_photo",

"g2_idfront",

"g2_idback"


];





for(let f of files){



if(document.getElementById(f).files.length===0){


errorBox.innerHTML=

"Please upload all guarantor documents.";


errorBox.style.display="block";


return;


}


}









// COMPRESS IMAGES



const g1Photo=

await compressImage(

document.getElementById("g1_photo").files[0]

);



const g1Front=

await compressImage(

document.getElementById("g1_idfront").files[0]

);



const g1Back=

await compressImage(

document.getElementById("g1_idback").files[0]

);







const g2Photo=

await compressImage(

document.getElementById("g2_photo").files[0]

);



const g2Front=

await compressImage(

document.getElementById("g2_idfront").files[0]

);



const g2Back=

await compressImage(

document.getElementById("g2_idback").files[0]

);









// CREATE APPLICATION OBJECT



const application={



clientId:client.id,



// CLIENT DETAILS FROM REGISTRATION


client:{


fullname:client.fullname,

nationalID:client.nationalID,

phone:client.phone,

occupation:client.occupation,

employer:client.employer,

monthlyIncome:client.monthlyIncome,

county:client.county,

address:client.address


},





// LOAN DETAILS


amount:amount,


monthlyInterest:amount*0.20,


purpose:purpose,





// GUARANTOR ONE


guarantor1:{


name:document.getElementById("g1_name").value,


id:document.getElementById("g1_id").value,


phone:document.getElementById("g1_phone").value,


relationship:document.getElementById("g1_relationship").value,


address:document.getElementById("g1_address").value,



photo:g1Photo,

idFront:g1Front,

idBack:g1Back


},






// GUARANTOR TWO



guarantor2:{


name:document.getElementById("g2_name").value,


id:document.getElementById("g2_id").value,


phone:document.getElementById("g2_phone").value,


relationship:document.getElementById("g2_relationship").value,


address:document.getElementById("g2_address").value,



photo:g2Photo,

idFront:g2Front,

idBack:g2Back


}




};









// SAVE TO DATABASE



const saved = DB.addApplication(application);








if(saved){



successBox.innerHTML=`

<h4>

<i class="fa fa-check-circle"></i>

Application Submitted Successfully

</h4>


<p>

Your loan request has been sent for approval.

</p>


<a href="client-dashboard.html"

class="btn btn-success">

Go To Dashboard

</a>


`;



successBox.style.display="block";



}



}
