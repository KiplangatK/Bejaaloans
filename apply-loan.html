  <script>


/* =====================================
   IMAGE PREVIEW
===================================== */


function previewImage(input,target){


const file=input.files[0];


if(file){


const reader=new FileReader();


reader.onload=function(e){


target.src=e.target.result;

target.style.display="block";


}


reader.readAsDataURL(file);


}


}





document.getElementById("guarantorPhoto")
.onchange=function(){


previewImage(

this,

document.getElementById("guarantorPhotoPreview")

);


};





document.getElementById("guarantorIDFront")
.onchange=function(){


previewImage(

this,

document.getElementById("guarantorIDFrontPreview")

);


};





document.getElementById("guarantorIDBack")
.onchange=function(){


previewImage(

this,

document.getElementById("guarantorIDBackPreview")

);


};









/* =====================================
   IMAGE COMPRESSION
===================================== */


function compressImage(file){


return new Promise(resolve=>{


const reader=new FileReader();



reader.onload=function(e){


const img=new Image();



img.onload=function(){



const canvas=document.createElement("canvas");


let width=img.width;

let height=img.height;


const max=900;



if(width>max){


height = height * max / width;

width=max;


}




canvas.width=width;

canvas.height=height;



const ctx=canvas.getContext("2d");


ctx.drawImage(
img,
0,
0,
width,
height
);



resolve(

canvas.toDataURL(
"image/jpeg",
0.7
)

);



}



img.src=e.target.result;


}



reader.readAsDataURL(file);



});


}









/* =====================================
   SUBMIT LOAN APPLICATION
===================================== */


async function submitLoanApplication(){



const errorBox =
document.getElementById("errorBox");


const successBox =
document.getElementById("successBox");



errorBox.style.display="none";

successBox.style.display="none";






const client = AUTH.currentClient();



if(!client){


window.location.href="client-portal.html";

return;


}







const loanAmount =
Number(
document.getElementById("loanAmount").value
);



const purpose =
document.getElementById("purpose").value.trim();








const guarantorName =
document.getElementById("guarantorName").value.trim();



const guarantorID =
document.getElementById("guarantorID").value.trim();



const guarantorPhone =
document.getElementById("guarantorPhone").value.trim();



const relationship =
document.getElementById("relationship").value.trim();



const guarantorAddress =
document.getElementById("guarantorAddress").value.trim();









// VALIDATION


if(

!loanAmount ||

!purpose ||

!guarantorName ||

!guarantorID ||

!guarantorPhone ||

!relationship ||

!guarantorAddress

){


errorBox.innerHTML=

"Please fill all required fields.";


errorBox.style.display="block";


return;


}






if(

document.getElementById("guarantorPhoto").files.length===0 ||

document.getElementById("guarantorIDFront").files.length===0 ||

document.getElementById("guarantorIDBack").files.length===0

){


errorBox.innerHTML=

"Please upload all guarantor documents.";


errorBox.style.display="block";


return;


}






if(!/^07\d{8}$/.test(guarantorPhone)){


errorBox.innerHTML=

"Invalid guarantor phone number format.";


errorBox.style.display="block";


return;


}









// COMPRESS GUARANTOR DOCUMENTS


const guarantorPhoto =

await compressImage(

document.getElementById("guarantorPhoto").files[0]

);




const guarantorIDFront =

await compressImage(

document.getElementById("guarantorIDFront").files[0]

);





const guarantorIDBack =

await compressImage(

document.getElementById("guarantorIDBack").files[0]

);









// CREATE APPLICATION OBJECT


const application={


clientId:client.id,



// loan details


amount:loanAmount,


purpose:purpose,




// client snapshot


clientName:client.fullname,

clientPhone:client.phone,

clientID:client.nationalID,




// guarantor


guarantor:{


name:guarantorName,


nationalID:guarantorID,


phone:guarantorPhone,


relationship:relationship,


address:guarantorAddress,



photo:guarantorPhoto,


idFront:guarantorIDFront,


idBack:guarantorIDBack



}



};









// SAVE TO DATABASE


const saved =

DB.addApplication(application);








if(saved){



successBox.innerHTML=`

<h5>

<i class="fa fa-check-circle"></i>

Loan Application Submitted

</h5>


<p>

Your application has been sent for approval.

</p>

`;



successBox.style.display="block";





setTimeout(()=>{


window.location.href="client-dashboard.html";


},2000);





}




}






</script>
