function previewImage(input,target){



let file=input.files[0];



if(!file){

return;

}




let reader=new FileReader();




reader.onload=function(e){



let img=document.getElementById(target);



img.src=e.target.result;



img.style.display="block";



}




reader.readAsDataURL(file);

// ================================
// GUARANTOR ID VALIDATION
// ================================

function validateGuarantorID(prefix) {
    const idInput = document.getElementById(prefix + "_id");
    const statusEl = document.getElementById(prefix + "_idStatus");
    const value = idInput.value.trim();

    if (!value) {
        statusEl.innerHTML = "";
        idInput.style.border = "";
        return;
    }

    if (!/^\d+$/.test(value)) {
        statusEl.innerHTML = '<span class="status-error">Numbers only.</span>';
        idInput.style.border = "2px solid #dc3545";
        return;
    }

    if (value.length < 6) {
        statusEl.innerHTML = '<span class="status-checking">At least 6 digits.</span>';
        idInput.style.border = "";
        return;
    }

    if (value.length > 10) {
        statusEl.innerHTML = '<span class="status-error">Max 10 digits.</span>';
        idInput.style.border = "2px solid #dc3545";
        return;
    }

    // Check not same as client's ID
    const clientID = document.getElementById("nationalID").value.trim();
    if (value === clientID) {
        statusEl.innerHTML = '<span class="status-error">Cannot use your own ID.</span>';
        idInput.style.border = "2px solid #dc3545";
        return;
    }

    statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Valid format.</span>';
    idInput.style.border = "2px solid #4caf50";
}


// ================================
// GUARANTOR PHONE VALIDATION
// ================================

function normalizePhone(raw) {
    let phone = raw.replace(/\s+/g, "").replace(/-/g, "");
    if (phone.startsWith("+2547")) phone = "0" + phone.substring(4);
    if (phone.startsWith("+2541")) phone = "0" + phone.substring(4);
    if (phone.startsWith("2547")) phone = "0" + phone.substring(3);
    if (phone.startsWith("2541")) phone = "0" + phone.substring(3);
    return phone;
}

function isValidPhone(raw) {
    const phone = normalizePhone(raw);
    return /^0[17]\d{8}$/.test(phone);
}

function validateGuarantorPhone(prefix) {
    const phoneInput = document.getElementById(prefix + "_phone");
    const statusEl = document.getElementById(prefix + "_phoneStatus");
    const raw = phoneInput.value.trim();

    if (!raw) {
        statusEl.innerHTML = "";
        phoneInput.style.border = "";
        return;
    }

    if (!isValidPhone(raw)) {
        statusEl.innerHTML = '<span class="status-error">Enter 07XXXXXXXX or +2547XXXXXXXX</span>';
        phoneInput.style.border = "2px solid #dc3545";
        return;
    }

    // Check not same as client's phone
    const clientPhone = document.getElementById("phone").value.trim();
    const normalized = normalizePhone(raw);
    if (normalized === clientPhone) {
        statusEl.innerHTML = '<span class="status-error">Cannot use your own phone.</span>';
        phoneInput.style.border = "2px solid #dc3545";
        return;
    }

    statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Format valid. Verify to confirm.</span>';
    phoneInput.style.border = "2px solid #ffc107";
}


// ================================
// GUARANTOR OTP
// ================================

const guarantorOTPs = {};

function sendGuarantorOTP(prefix) {
    const raw = document.getElementById(prefix + "_phone").value.trim();
    const statusEl = document.getElementById(prefix + "_phoneStatus");
    const sendBtn = document.getElementById(prefix + "_sendOTPBtn");

    if (!isValidPhone(raw)) {
        statusEl.innerHTML = '<span class="status-error">Enter a valid phone first.</span>';
        return;
    }

    const phone = normalizePhone(raw);

    // Generate OTP
    const otp = String(Math.floor(100000 + Math.random() * 900000));
    guarantorOTPs[prefix] = otp;
    console.log("OTP for " + prefix + " (" + phone + "): " + otp);

    statusEl.innerHTML = '<span class="status-ok">Code sent! (Demo: <b>' + otp + '</b>)</span>';

    document.getElementById(prefix + "_otpBox").style.display = "block";
    sendBtn.disabled = true;
    sendBtn.innerHTML = '<i class="fa fa-clock"></i> Sent';
}


function otpNextG(current, nextId) {
    if (current.value.length === 1 && nextId) {
        document.getElementById(nextId).focus();
    }
}


function verifyGuarantorOTP(prefix) {
    const statusEl = document.getElementById(prefix + "_otpStatus");
    const phoneInput = document.getElementById(prefix + "_phone");

    const entered = 
        document.getElementById(prefix + "_otp1").value +
        document.getElementById(prefix + "_otp2").value +
        document.getElementById(prefix + "_otp3").value +
        document.getElementById(prefix + "_otp4").value +
        document.getElementById(prefix + "_otp5").value +
        document.getElementById(prefix + "_otp6").value;

    if (entered.length < 6) {
        statusEl.innerHTML = '<span class="status-error">Enter complete code.</span>';
        return;
    }

    if (entered === guarantorOTPs[prefix]) {
        statusEl.innerHTML = '<span class="status-ok"><i class="fa fa-check-circle"></i> Verified!</span>';
        sessionStorage.setItem(prefix + "_phoneVerified", "true");
        phoneInput.style.border = "2px solid #4caf50";
        document.getElementById(prefix + "_otpBox").style.display = "none";
        document.getElementById(prefix + "_sendOTPBtn").innerHTML = '<i class="fa fa-check"></i> Done';
    } else {
        statusEl.innerHTML = '<span class="status-error">Incorrect code.</span>';
    }
}


</script>

<script>


// =================================
// IMAGE COMPRESSION
// =================================


function compressImage(file){


return new Promise(resolve=>{


let reader=new FileReader();



reader.onload=function(e){


let img=new Image();



img.onload=function(){



let canvas=document.createElement("canvas");



let maxWidth=700;



let width=img.width;
let height=img.height;



if(width>maxWidth){


height=(height*maxWidth)/width;


width=maxWidth;


}



canvas.width=width;
canvas.height=height;



let ctx=canvas.getContext("2d");



ctx.drawImage(

img,

0,

0,

width,

height

);





resolve(

canvas.toDataURL(

"image/jpeg",

0.6

)

);



}




img.src=e.target.result;



}



reader.readAsDataURL(file);



});


}








// =================================
// SUBMIT LOAN APPLICATION
// =================================


async function submitLoanApplication(){



let errorBox=document.getElementById("errorBox");
let successBox=document.getElementById("successBox");
let btn=document.getElementById("submitBtn");




errorBox.style.display="none";
successBox.style.display="none";





let client=AUTH.currentClient();



if(!client){


window.location.href="client-portal.html";
return;


}






let amount=

Number(

document.getElementById("loanAmount").value

);





let purpose=

document.getElementById("purpose").value.trim();






if(amount<=0){


errorBox.innerHTML=

"Enter a valid loan amount";


errorBox.style.display="block";


return;


}





if(purpose===""){


errorBox.innerHTML=

"Enter loan purpose";


errorBox.style.display="block";


return;


}









// ================================
// CHECK GUARANTORS
// ================================



let required=[


"g1_name",

"g1_id",

"g1_phone",

"g1_relationship",

"g1_address",


"g2_name",

"g2_id",

"g2_phone",

"g2_relationship",

"g2_address"


];






for(let field of required){


if(document.getElementById(field).value.trim()===""){



errorBox.innerHTML=

"Please complete all guarantor details";


errorBox.style.display="block";


return;


}


}





// Validate Guarantor 1 ID format
let g1_id = document.getElementById("g1_id").value.trim();
if (!/^\d{6,10}$/.test(g1_id)) {
    errorBox.innerHTML = "Guarantor 1: Invalid ID format (6-10 digits required).";
    errorBox.style.display = "block";
    return;
}

// Validate Guarantor 2 ID format
let g2_id = document.getElementById("g2_id").value.trim();
if (!/^\d{6,10}$/.test(g2_id)) {
    errorBox.innerHTML = "Guarantor 2: Invalid ID format (6-10 digits required).";
    errorBox.style.display = "block";
    return;
}

// Validate Guarantor 1 phone
let g1_phone = document.getElementById("g1_phone").value.trim();
if (!isValidPhone(g1_phone)) {
    errorBox.innerHTML = "Guarantor 1: Enter a valid phone number.";
    errorBox.style.display = "block";
    return;
}
if (!sessionStorage.getItem("g1_phoneVerified")) {
    errorBox.innerHTML = "Guarantor 1: Please verify phone number with OTP.";
    errorBox.style.display = "block";
    return;
}

// Validate Guarantor 2 phone
let g2_phone = document.getElementById("g2_phone").value.trim();
if (!isValidPhone(g2_phone)) {
    errorBox.innerHTML = "Guarantor 2: Enter a valid phone number.";
    errorBox.style.display = "block";
    return;
}
if (!sessionStorage.getItem("g2_phoneVerified")) {
    errorBox.innerHTML = "Guarantor 2: Please verify phone number with OTP.";
    errorBox.style.display = "block";
    return;
}

// Guarantors can't have same phone
if (normalizePhone(g1_phone) === normalizePhone(g2_phone)) {
    errorBox.innerHTML = "Guarantors must have different phone numbers.";
    errorBox.style.display = "block";
    return;
}

// Guarantors can't have same ID
if (g1_id === g2_id) {
    errorBox.innerHTML = "Guarantors must have different ID numbers.";
    errorBox.style.display = "block";
    return;
}









// ================================
// CHECK DOCUMENTS
// ================================



let documents=[


"g1_photo",

"g1_idfront",

"g1_idback",


"g2_photo",

"g2_idfront",

"g2_idback"


];






for(let file of documents){



if(

document.getElementById(file)

.files.length===0

){



errorBox.innerHTML=

"Upload all guarantor documents";


errorBox.style.display="block";


return;


}



}








btn.disabled=true;


btn.innerHTML=

"Submitting...";








try{





// COMPRESS IMAGES



let g1Photo=

await compressImage(

document.getElementById("g1_photo").files[0]

);



let g1Front=

await compressImage(

document.getElementById("g1_idfront").files[0]

);



let g1Back=

await compressImage(

document.getElementById("g1_idback").files[0]

);






let g2Photo=

await compressImage(

document.getElementById("g2_photo").files[0]

);



let g2Front=

await compressImage(

document.getElementById("g2_idfront").files[0]

);



let g2Back=

await compressImage(

document.getElementById("g2_idback").files[0]

);










// ================================
// APPLICATION DATA
// ================================



let application={



clientId:client.id,



amount:amount,


purpose:purpose,



monthlyInterest:

amount*0.20,




client:{


fullname:client.fullname,

nationalID:client.nationalID,

phone:client.phone


},





guarantor1:{


name:document.getElementById("g1_name").value,

id:g1_id,

phone:normalizePhone(g1_phone),

relationship:document.getElementById("g1_relationship").value,

address:document.getElementById("g1_address").value,


photo:g1Photo,

idFront:g1Front,

idBack:g1Back


},





guarantor2:{


name:document.getElementById("g2_name").value,

id:g2_id,

phone:normalizePhone(g2_phone),

relationship:document.getElementById("g2_relationship").value,

address:document.getElementById("g2_address").value,


photo:g2Photo,

idFront:g2Front,

idBack:g2Back


}





};









// ================================
// SAVE APPLICATION
// ================================



let saved = await DB.addApplication(application);






if(saved){



successBox.innerHTML=`


<h4>

<i class="fa fa-check-circle"></i>

Application Submitted Successfully

</h4>


<p>

Your loan application has been sent for approval.

</p>



<a href="client-dashboard.html"

class="btn btn-success">

Go Dashboard

</a>


`;



successBox.style.display="block";


// Clear guarantor verification flags
sessionStorage.removeItem("g1_phoneVerified");
sessionStorage.removeItem("g2_phoneVerified");



btn.disabled=false;


btn.innerHTML=

"Submit Loan Application";



}




}

catch(error){



console.error(error);



errorBox.innerHTML=

"Error submitting application. Try again.";



errorBox.style.display="block";



btn.disabled=false;


btn.innerHTML=

"Submit Loan Application";



}



}
