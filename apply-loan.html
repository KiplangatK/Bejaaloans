<script>


// ================================
// IMAGE PREVIEW
// ================================


function previewImage(input,target){



let file=input.files[0];



if(!file){

return;

}




let reader=new FileReader();




reader.onload=function(e){



let img=document.getElementById(target);



img.src=e.target.result;



img.style.display="block";



}




reader.readAsDataURL(file);



}



</script>

<script>


// =================================
// IMAGE COMPRESSION
// =================================


function compressImage(file){


return new Promise(resolve=>{


let reader=new FileReader();



reader.onload=function(e){


let img=new Image();



img.onload=function(){



let canvas=document.createElement("canvas");



let maxWidth=700;



let width=img.width;

let height=img.height;



if(width>maxWidth){


height=(height*maxWidth)/width;


width=maxWidth;


}



canvas.width=width;

canvas.height=height;



let ctx=canvas.getContext("2d");



ctx.drawImage(

img,

0,

0,

width,

height

);





resolve(

canvas.toDataURL(

"image/jpeg",

0.6

)

);



}




img.src=e.target.result;



}



reader.readAsDataURL(file);



});


}








// =================================
// SUBMIT LOAN APPLICATION
// =================================


async function submitLoanApplication(){



let errorBox=document.getElementById("errorBox");

let successBox=document.getElementById("successBox");

let btn=document.getElementById("submitBtn");




errorBox.style.display="none";

successBox.style.display="none";





let client=AUTH.currentClient();



if(!client){


window.location.href="client-portal.html";

return;


}






let amount=

Number(

document.getElementById("loanAmount").value

);





let purpose=

document.getElementById("purpose").value.trim();






if(amount<=0){


errorBox.innerHTML=

"Enter a valid loan amount";


errorBox.style.display="block";


return;


}





if(purpose===""){


errorBox.innerHTML=

"Enter loan purpose";


errorBox.style.display="block";


return;


}









// ================================
// CHECK GUARANTORS
// ================================



let required=[


"g1_name",

"g1_id",

"g1_phone",

"g1_relationship",

"g1_address",


"g2_name",

"g2_id",

"g2_phone",

"g2_relationship",

"g2_address"


];






for(let field of required){


if(document.getElementById(field).value.trim()===""){



errorBox.innerHTML=

"Please complete guarantor details";


errorBox.style.display="block";


return;


}


}









// ================================
// CHECK DOCUMENTS
// ================================



let documents=[


"g1_photo",

"g1_idfront",

"g1_idback",


"g2_photo",

"g2_idfront",

"g2_idback"


];






for(let file of documents){



if(

document.getElementById(file)

.files.length===0

){



errorBox.innerHTML=

"Upload all guarantor documents";


errorBox.style.display="block";


return;


}



}








btn.disabled=true;


btn.innerHTML=

"Submitting...";








try{





// COMPRESS IMAGES



let g1Photo=

await compressImage(

document.getElementById("g1_photo").files[0]

);



let g1Front=

await compressImage(

document.getElementById("g1_idfront").files[0]

);



let g1Back=

await compressImage(

document.getElementById("g1_idback").files[0]

);






let g2Photo=

await compressImage(

document.getElementById("g2_photo").files[0]

);



let g2Front=

await compressImage(

document.getElementById("g2_idfront").files[0]

);



let g2Back=

await compressImage(

document.getElementById("g2_idback").files[0]

);










// ================================
// APPLICATION DATA
// ================================



let application={



clientId:client.id,



amount:amount,


purpose:purpose,



monthlyInterest:

amount*0.20,




client:{


fullname:client.fullname,

nationalID:client.nationalID,

phone:client.phone


},





guarantor1:{


name:g1_name.value,

id:g1_id.value,

phone:g1_phone.value,

relationship:g1_relationship.value,

address:g1_address.value,


photo:g1Photo,

idFront:g1Front,

idBack:g1Back


},





guarantor2:{


name:g2_name.value,

id:g2_id.value,

phone:g2_phone.value,

relationship:g2_relationship.value,

address:g2_address.value,


photo:g2Photo,

idFront:g2Front,

idBack:g2Back


}





};









// ================================
// SAVE APPLICATION
// ================================



let saved=DB.addApplication(application);






if(saved){



successBox.innerHTML=`


<h4>

<i class="fa fa-check-circle"></i>

Application Submitted Successfully

</h4>


<p>

Your loan application has been sent for approval.

</p>



<a href="client-dashboard.html"

class="btn btn-success">

Go Dashboard

</a>


`;



successBox.style.display="block";



btn.disabled=false;


btn.innerHTML=

"Submit Loan Application";



}




}

catch(error){



console.error(error);



errorBox.innerHTML=

"Error submitting application. Try again.";



errorBox.style.display="block";



btn.disabled=false;


btn.innerHTML=

"Submit Loan Application";



}



}



</script>
